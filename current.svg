<svg width="800" height="148" viewBox="0 0 800 148" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes slideIn {
      0%   { opacity: 0; transform: translateX(-10px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes badgePop {
      0%   { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes livePulse {
      0%, 100% { r: 3; opacity: 1; }
      50%       { r: 5; opacity: 0.4; }
    }
    @keyframes accentGrow {
      0%   { height: 0; }
      100% { height: 148px; }
    }
    @keyframes borderDraw {
      0%   { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    .acc  { animation: accentGrow 0.6s cubic-bezier(.22,1,.36,1) 0s both; }
    .i1   { animation: slideIn 0.5s cubic-bezier(.22,1,.36,1) 0.15s both; }
    .i2   { animation: slideIn 0.5s cubic-bezier(.22,1,.36,1) 0.32s both; }
    .i3   { animation: slideIn 0.5s cubic-bezier(.22,1,.36,1) 0.49s both; }
    .b1   { animation: badgePop 0.4s cubic-bezier(.34,1.56,.64,1) 0.45s both; }
    .b2   { animation: badgePop 0.4s cubic-bezier(.34,1.56,.64,1) 0.62s both; }
    .b3   { animation: badgePop 0.4s cubic-bezier(.34,1.56,.64,1) 0.79s both; }
    .live { animation: livePulse 2s ease-in-out infinite; }
    .idx  { font-family:'Courier New',monospace; font-size:9px; fill:rgba(232,232,234,0.2); }
    .txt  { font-family:'Courier New',monospace; font-size:11px; fill:rgba(232,232,234,0.72); }
  </style>

  <rect class="acc" x="0" y="0" width="2" height="148" fill="#4af0a0" opacity="0.45"/>
  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="rgba(74,240,160,0.5)" letter-spacing="3">// CURRENT</text>

  <g class="i1">
    <text x="18" y="52" class="idx">01</text>
    <text x="44" y="52" class="txt">Flood prediction pipeline — raw data to deployable model</text>
    <g class="b1">
      <rect x="612" y="40" width="56" height="18" rx="3" fill="rgba(74,240,160,0.12)"/>
      <circle class="live" cx="623" cy="49" r="3" fill="#4af0a0"/>
      <text x="648" y="53" font-family="'Courier New',monospace" font-size="8.5" fill="#4af0a0" text-anchor="middle">active</text>
    </g>
  </g>
  <line x1="18" y1="63" x2="782" y2="63" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>

  <g class="i2">
    <text x="18" y="90" class="idx">02</text>
    <text x="44" y="90" class="txt">Flutter — learning by building, not by tutorial</text>
    <g class="b2">
      <rect x="600" y="78" width="74" height="18" rx="3" fill="rgba(240,184,74,0.1)"/>
      <text x="637" y="91" font-family="'Courier New',monospace" font-size="8.5" fill="rgba(240,184,74,0.85)" text-anchor="middle">learning</text>
    </g>
  </g>
  <line x1="18" y1="101" x2="782" y2="101" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>

  <g class="i3">
    <text x="18" y="128" class="idx">03</text>
    <text x="44" y="128" class="txt">Full-stack depth — less surface area, more structural understanding</text>
    <g class="b3">
      <rect x="600" y="116" width="72" height="18" rx="3" fill="rgba(240,96,96,0.08)"/>
      <text x="636" y="129" font-family="'Courier New',monospace" font-size="8.5" fill="rgba(240,96,96,0.8)" text-anchor="middle">building</text>
    </g>
  </g>
</svg>
