<svg width="800" height="170" viewBox="0 0 800 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="pulsGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="badgeGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Progress bar track masks -->
    <clipPath id="pb0"><rect x="600" y="42" width="180" height="14"/></clipPath>
    <clipPath id="pb1"><rect x="600" y="88" width="180" height="14"/></clipPath>
    <clipPath id="pb2"><rect x="600" y="134" width="180" height="14"/></clipPath>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&amp;display=swap');

    /* ── Left accent ── */
    @keyframes accGrow{
      0%  {height:0;transform-origin:top}
      100%{height:170px}
    }

    /* ── Section header: decode left to right ── */
    @keyframes hdrDecode{
      0%  {opacity:0;letter-spacing:12px;filter:blur(4px)}
      50% {opacity:0.7;letter-spacing:5px;filter:blur(1px)}
      100%{opacity:1;letter-spacing:3px;filter:blur(0)}
    }

    /* ── Row: slide from left with spring ── */
    @keyframes rowSlide{
      0%  {opacity:0;transform:translateX(-24px)}
      65% {transform:translateX(3px)}
      82% {transform:translateX(-1px)}
      100%{opacity:1;transform:translateX(0)}
    }

    /* ── Index number: increment flash ── */
    @keyframes idxFlash{
      0%  {fill:#4af0a0;opacity:0;transform:scale(1.5)}
      30% {fill:#ffffff;opacity:1;transform:scale(1.08)}
      60% {fill:#4af0a0;transform:scale(1)}
      100%{fill:rgba(74,240,160,0.38)}
    }

    /* ── Task text: typewriter ── */
    @keyframes typeIn{
      0%  {clip-path:inset(0 100% 0 0);opacity:0}
      4%  {opacity:1}
      100%{clip-path:inset(0 0% 0 0)}
    }

    /* ── Progress bar: scan fill then disappear → badge appears ── */
    @keyframes pbFill{
      0%  {width:0px;opacity:1}
      70% {width:186px;opacity:1}
      90% {width:186px;opacity:0}
      100%{width:0px;opacity:0}
    }

    /* ── Badge: appear after progress fill ── */
    @keyframes badgeIn{
      0%  {opacity:0;transform:scaleX(0.4) translateX(20px)}
      70% {opacity:0}
      80% {opacity:1;transform:scaleX(1.05) translateX(-1px)}
      100%{opacity:1;transform:scaleX(1) translateX(0)}
    }

    /* ── Active dot radar ── */
    @keyframes radarPing{
      0%  {r:3;opacity:0.9;stroke-width:2}
      70% {r:10;opacity:0;stroke-width:0.5}
      100%{r:3;opacity:0}
    }
    @keyframes dotBlink{0%,100%{opacity:1}50%{opacity:0.4}}

    /* ── Divider scan from center outward ── */
    @keyframes divCenter{
      0%  {clip-path:inset(0 50% 0 50%)}
      100%{clip-path:inset(0 0% 0 0%)}
    }

    /* Assignments */
    .acc-bar { animation:accGrow 0.5s cubic-bezier(.22,1,.36,1) 0s both }
    .hdr     { animation:hdrDecode 0.7s ease 0.08s both }

    .row0    { animation:rowSlide 0.55s cubic-bezier(.22,1,.36,1) 0.20s both }
    .row1    { animation:rowSlide 0.55s cubic-bezier(.22,1,.36,1) 0.45s both }
    .row2    { animation:rowSlide 0.55s cubic-bezier(.22,1,.36,1) 0.70s both }

    .idx0    { animation:idxFlash 0.6s ease 0.22s both; transform-origin:18px 52px }
    .idx1    { animation:idxFlash 0.6s ease 0.47s both; transform-origin:18px 98px }
    .idx2    { animation:idxFlash 0.6s ease 0.72s both; transform-origin:18px 144px }

    .tw0     { animation:typeIn  1.0s steps(55,end) 0.30s both }
    .tw1     { animation:typeIn  0.75s steps(44,end) 0.55s both }
    .tw2     { animation:typeIn  1.15s steps(62,end) 0.80s both }

    /* Progress bars fill over 1.2s then vanish */
    .pb0-fill{ animation:pbFill 1.4s ease 0.90s both }
    .pb1-fill{ animation:pbFill 1.2s ease 1.10s both }
    .pb2-fill{ animation:pbFill 1.1s ease 1.30s both }

    /* Badges appear at 70% of pb animation */
    .badge0  { animation:badgeIn 1.4s ease 0.90s both }
    .badge1  { animation:badgeIn 1.2s ease 1.10s both }
    .badge2  { animation:badgeIn 1.1s ease 1.30s both }

    /* Radar active dot */
    .ring0   { animation:radarPing 2.4s ease-out 2.5s infinite }
    .dot0    { animation:dotBlink  1.9s ease-in-out 2.5s infinite }

    .div0    { animation:divCenter 0.5s ease 0.35s both }
    .div1    { animation:divCenter 0.5s ease 0.60s both }

    /* Styles */
    .hdr-txt {font-family:'Roboto Mono',monospace;font-size:9px;fill:rgba(74,240,160,0.55);letter-spacing:3px}
    .idx-txt {font-family:'Roboto Mono',monospace;font-size:9px;font-weight:700}
    .task    {font-family:'Roboto Mono',monospace;font-size:11.5px;fill:rgba(232,232,234,0.75)}
    .badge-t {font-family:'Roboto Mono',monospace;font-size:8px;text-anchor:middle}
    .pb-track{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:0.5}
  </style>

  <!-- Border rules -->
  <line x1="0" y1="0"   x2="800" y2="0"   stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="0" y1="170" x2="800" y2="170" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Left accent bar -->
  <rect class="acc-bar" x="0" y="0" width="3" height="170" fill="#4af0a0" opacity="0.5"/>

  <!-- Header -->
  <text class="hdr-txt hdr" x="14" y="20">// CURRENT</text>

  <!-- ═══════════ ROW 1 ═══════════ -->
  <g class="row0">
    <text class="idx-txt idx0" x="14" y="52" fill="rgba(74,240,160,0.38)">01</text>
  </g>
  <g class="tw0">
    <text class="task" x="40" y="52">Flood prediction pipeline — raw data to deployable model</text>
  </g>

  <!-- Progress bar track + animated fill -->
  <rect x="598" y="41" width="186" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <g clip-path="url(#pb0)">
    <rect class="pb0-fill" x="600" y="43" height="10" rx="1" fill="rgba(74,240,160,0.35)"/>
  </g>

  <!-- Badge (appears after progress completes) -->
  <g class="badge0">
    <rect x="598" y="41" width="186" height="14" rx="2" fill="rgba(74,240,160,0.07)" stroke="rgba(74,240,160,0.28)" stroke-width="0.6"/>
    <!-- Radar ping -->
    <circle class="ring0" cx="612" cy="48" r="3" fill="none" stroke="#4af0a0"/>
    <circle class="dot0"  cx="612" cy="48" r="2.5" fill="#4af0a0" filter="url(#pulsGlow)"/>
    <text class="badge-t" x="701" y="52" fill="#4af0a0">ACTIVE</text>
    <!-- checkmark accent -->
    <text x="622" y="52" font-family="'Roboto Mono',monospace" font-size="7" fill="rgba(74,240,160,0.5)">■ ■ ■</text>
  </g>

  <!-- Divider 0 -->
  <line class="div0" x1="14" y1="64" x2="786" y2="64" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>

  <!-- ═══════════ ROW 2 ═══════════ -->
  <g class="row1">
    <text class="idx-txt idx1" x="14" y="98" fill="rgba(74,240,160,0.38)">02</text>
  </g>
  <g class="tw1">
    <text class="task" x="40" y="98">Flutter — learning by building, not by tutorial</text>
  </g>

  <rect x="598" y="87" width="186" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <g clip-path="url(#pb1)">
    <rect class="pb1-fill" x="600" y="89" height="10" rx="1" fill="rgba(240,184,74,0.35)"/>
  </g>
  <g class="badge1">
    <rect x="598" y="87" width="186" height="14" rx="2" fill="rgba(240,184,74,0.06)" stroke="rgba(240,184,74,0.24)" stroke-width="0.6"/>
    <text class="badge-t" x="691" y="98" fill="rgba(240,184,74,0.9)">LEARNING</text>
    <text x="610" y="98" font-family="'Roboto Mono',monospace" font-size="7" fill="rgba(240,184,74,0.4)">▶ ▶ ·</text>
  </g>

  <line class="div1" x1="14" y1="110" x2="786" y2="110" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>

  <!-- ═══════════ ROW 3 ═══════════ -->
  <g class="row2">
    <text class="idx-txt idx2" x="14" y="144" fill="rgba(74,240,160,0.38)">03</text>
  </g>
  <g class="tw2">
    <text class="task" x="40" y="144">Full-stack depth — less surface area, more structural understanding</text>
  </g>

  <rect x="598" y="133" width="186" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <g clip-path="url(#pb2)">
    <rect class="pb2-fill" x="600" y="135" height="10" rx="1" fill="rgba(240,96,96,0.3)"/>
  </g>
  <g class="badge2">
    <rect x="598" y="133" width="186" height="14" rx="2" fill="rgba(240,96,96,0.06)" stroke="rgba(240,96,96,0.22)" stroke-width="0.6"/>
    <text class="badge-t" x="691" y="144" fill="rgba(240,96,96,0.85)">BUILDING</text>
    <text x="610" y="144" font-family="'Roboto Mono',monospace" font-size="7" fill="rgba(240,96,96,0.4)">◆ ◆ ◆</text>
  </g>
</svg>
