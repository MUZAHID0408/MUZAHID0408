<svg width="800" height="162" viewBox="0 0 800 162" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Typewriter */
    @keyframes type{0%{clip-path:inset(0 100% 0 0)}100%{clip-path:inset(0 0% 0 0)}}
    /* Snap in — brightness flash then settle */
    @keyframes snap{0%{opacity:0;filter:blur(4px) brightness(4)}50%{filter:blur(0) brightness(1.6)}100%{opacity:1;filter:blur(0) brightness(1)}}
    /* Badge spring */
    @keyframes spring{0%{opacity:0;transform:scale(0.5) translateX(10px)}65%{transform:scale(1.06) translateX(-2px)}100%{opacity:1;transform:scale(1) translateX(0)}}
    /* Progress bar fill */
    @keyframes fillBar{0%{width:0}100%{width:var(--w)}}
    /* Radar ring */
    @keyframes radar{0%{r:3;opacity:0.9;stroke-width:1.5}80%{r:11;opacity:0;stroke-width:0.5}100%{r:3;opacity:0}}
    /* Dot pulse */
    @keyframes dotP{0%,100%{opacity:1}50%{opacity:0.3}}
    /* Divider */
    @keyframes divD{0%{stroke-dashoffset:800}100%{stroke-dashoffset:0}}
    /* Bar grow */
    @keyframes vGrow{0%{transform:scaleY(0);transform-origin:top}100%{transform:scaleY(1);transform-origin:top}}

    .acc{animation:vGrow 0.5s cubic-bezier(.22,1,.36,1) 0s both}

    .n1{animation:snap   0.4s ease 0.10s both}
    .n2{animation:snap   0.4s ease 0.32s both}
    .n3{animation:snap   0.4s ease 0.54s both}

    .tw1{animation:type 1.0s steps(55,end) 0.18s both}
    .tw2{animation:type 0.7s steps(45,end) 0.40s both}
    .tw3{animation:type 1.1s steps(62,end) 0.62s both}

    .bg1{animation:spring 0.45s cubic-bezier(.34,1.56,.64,1) 0.85s both}
    .bg2{animation:spring 0.45s cubic-bezier(.34,1.56,.64,1) 1.07s both}
    .bg3{animation:spring 0.45s cubic-bezier(.34,1.56,.64,1) 1.29s both}

    .d1{stroke-dasharray:800;animation:divD 0.5s ease 0.28s both}
    .d2{stroke-dasharray:800;animation:divD 0.5s ease 0.50s both}

    .ring{animation:radar 2.2s ease-out 1.6s infinite}
    .dot {animation:dotP  1.8s ease-in-out infinite}

    .hdr{font-family:'Roboto Mono',monospace;font-size:9px;fill:rgba(74,240,160,0.5);letter-spacing:3px}
    .idx{font-family:'Roboto Mono',monospace;font-size:8.5px;fill:rgba(74,240,160,0.3)}
    .txt{font-family:'Roboto Mono',monospace;font-size:11.5px;fill:rgba(232,232,234,0.72)}
    .btx{font-family:'Roboto Mono',monospace;font-size:8.5px;text-anchor:middle}
  </style>

  <line x1="0" y1="0"   x2="800" y2="0"   stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <line x1="0" y1="162" x2="800" y2="162" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <rect class="acc" x="0" y="0" width="3" height="162" fill="#4af0a0" opacity="0.45"/>

  <text class="hdr" x="14" y="20">// CURRENT</text>

  <!-- row 1 -->
  <text class="idx n1" x="14" y="52">01</text>
  <g class="tw1"><text class="txt" x="42" y="52">Flood prediction pipeline — raw data to deployable model</text></g>
  <g class="bg1">
    <rect x="614" y="40" width="60" height="19" rx="2" fill="rgba(74,240,160,0.08)" stroke="rgba(74,240,160,0.25)" stroke-width="0.6"/>
    <circle class="ring" cx="626" cy="49" r="3" fill="none" stroke="#4af0a0"/>
    <circle class="dot"  cx="626" cy="49" r="3" fill="#4af0a0"/>
    <text class="btx" x="650" y="53" fill="#4af0a0">active</text>
  </g>
  <line class="d1" x1="14" y1="64" x2="786" y2="64" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>

  <!-- row 2 -->
  <text class="idx n2" x="14" y="98">02</text>
  <g class="tw2"><text class="txt" x="42" y="98">Flutter — learning by building, not by tutorial</text></g>
  <g class="bg2">
    <rect x="604" y="86" width="76" height="19" rx="2" fill="rgba(240,184,74,0.08)" stroke="rgba(240,184,74,0.22)" stroke-width="0.6"/>
    <text class="btx" x="642" y="100" fill="rgba(240,184,74,0.85)">learning</text>
  </g>
  <line class="d2" x1="14" y1="110" x2="786" y2="110" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>

  <!-- row 3 -->
  <text class="idx n3" x="14" y="144">03</text>
  <g class="tw3"><text class="txt" x="42" y="144">Full-stack depth — less surface area, more structural understanding</text></g>
  <g class="bg3">
    <rect x="604" y="132" width="76" height="19" rx="2" fill="rgba(240,96,96,0.07)" stroke="rgba(240,96,96,0.2)" stroke-width="0.6"/>
    <text class="btx" x="642" y="146" fill="rgba(240,96,96,0.8)">building</text>
  </g>
</svg>
