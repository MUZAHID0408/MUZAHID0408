<svg width="800" height="160" viewBox="0 0 800 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Typewriter — text reveals character width at a time via clip */
    @keyframes typewrite {
      0%   { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0%   0 0); }
    }
    /* Index number count-up feel — blur snap */
    @keyframes snapIn {
      0%   { opacity:0; filter: blur(4px) brightness(3); transform: scale(1.15); }
      60%  { filter: blur(0) brightness(1.4); transform: scale(1.03); }
      100% { opacity:1; filter: blur(0) brightness(1); transform: scale(1); }
    }
    /* Badge spring */
    @keyframes spring {
      0%   { opacity:0; transform: scale(0.6) translateY(6px); }
      65%  { transform: scale(1.08) translateY(-2px); }
      100% { opacity:1; transform: scale(1) translateY(0); }
    }
    /* Live pulse ring */
    @keyframes ring {
      0%   { r:3; opacity:0.9; }
      70%  { r:9; opacity:0; }
      100% { r:3; opacity:0; }
    }
    @keyframes liveDot {
      0%,100% { opacity:1; }
      50%      { opacity:0.35; }
    }
    /* Bar grow */
    @keyframes barGrow {
      0%   { transform:scaleY(0); transform-origin:top; }
      100% { transform:scaleY(1); transform-origin:top; }
    }
    /* Divider draw */
    @keyframes divDraw {
      0%   { stroke-dashoffset:800; }
      100% { stroke-dashoffset:0; }
    }

    .bar  { animation: barGrow  0.5s cubic-bezier(.22,1,.36,1) 0.0s both; }

    .n1   { animation: snapIn   0.45s cubic-bezier(.22,1,.36,1) 0.10s both; }
    .n2   { animation: snapIn   0.45s cubic-bezier(.22,1,.36,1) 0.30s both; }
    .n3   { animation: snapIn   0.45s cubic-bezier(.22,1,.36,1) 0.50s both; }

    .tw1  { animation: typewrite 0.9s steps(52,end) 0.18s both; }
    .tw2  { animation: typewrite 0.7s steps(42,end) 0.38s both; }
    .tw3  { animation: typewrite 1.0s steps(58,end) 0.58s both; }

    .b1   { animation: spring 0.5s cubic-bezier(.34,1.56,.64,1) 0.80s both; }
    .b2   { animation: spring 0.5s cubic-bezier(.34,1.56,.64,1) 1.00s both; }
    .b3   { animation: spring 0.5s cubic-bezier(.34,1.56,.64,1) 1.20s both; }

    .ring { animation: ring    2s ease-out 1.5s infinite; }
    .live { animation: liveDot 2s ease-in-out infinite; }

    .d1   { stroke-dasharray:800; animation: divDraw 0.5s ease 0.25s both; }
    .d2   { stroke-dasharray:800; animation: divDraw 0.5s ease 0.45s both; }

    .hdr  { font-family:'Roboto Mono',monospace; font-size:9px; fill:rgba(74,240,160,0.5); letter-spacing:3px; }
    .idx  { font-family:'Roboto Mono',monospace; font-size:9px; fill:rgba(232,232,234,0.2); }
    .txt  { font-family:'Roboto Mono',monospace; font-size:11.5px; fill:rgba(232,232,234,0.72); }
  </style>

  <rect class="bar" x="0" y="0" width="3" height="160" fill="#4af0a0" opacity="0.45"/>
  <line x1="0" y1="0"   x2="800" y2="0"   stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <line x1="0" y1="160" x2="800" y2="160" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <text class="hdr" x="18" y="22">// CURRENT</text>

  <!-- Row 1 -->
  <text class="idx n1" x="18" y="55">01</text>
  <g class="tw1"><text class="txt" x="46" y="55">Flood prediction pipeline — raw data to deployable model</text></g>
  <g class="b1">
    <rect x="614" y="42" width="56" height="19" rx="3" fill="rgba(74,240,160,0.1)"/>
    <circle class="ring" cx="625" cy="51" r="3" fill="none" stroke="#4af0a0" stroke-width="1"/>
    <circle class="live" cx="625" cy="51" r="3" fill="#4af0a0"/>
    <text x="648" y="55" font-family="'Roboto Mono',monospace" font-size="8.5" fill="#4af0a0" text-anchor="middle">active</text>
  </g>
  <line class="d1" x1="18" y1="67" x2="782" y2="67" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>

  <!-- Row 2 -->
  <text class="idx n2" x="18" y="97">02</text>
  <g class="tw2"><text class="txt" x="46" y="97">Flutter — learning by building, not by tutorial</text></g>
  <g class="b2">
    <rect x="602" y="84" width="74" height="19" rx="3" fill="rgba(240,184,74,0.1)"/>
    <text x="639" y="98" font-family="'Roboto Mono',monospace" font-size="8.5" fill="rgba(240,184,74,0.85)" text-anchor="middle">learning</text>
  </g>
  <line class="d2" x1="18" y1="109" x2="782" y2="109" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>

  <!-- Row 3 -->
  <text class="idx n3" x="18" y="139">03</text>
  <g class="tw3"><text class="txt" x="46" y="139">Full-stack depth — less surface area, more structural understanding</text></g>
  <g class="b3">
    <rect x="602" y="126" width="72" height="19" rx="3" fill="rgba(240,96,96,0.08)"/>
    <text x="638" y="140" font-family="'Roboto Mono',monospace" font-size="8.5" fill="rgba(240,96,96,0.8)" text-anchor="middle">building</text>
  </g>
</svg>
