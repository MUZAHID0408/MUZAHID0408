<svg width="800" height="170" viewBox="0 0 800 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="bpGlow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="accentGlw">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip cards to their bounds so expansion doesn't overflow -->
    <clipPath id="card0Clip"><rect x="14"  y="30" width="374" height="124" rx="2"/></clipPath>
    <clipPath id="card1Clip"><rect x="412" y="30" width="374" height="124" rx="2"/></clipPath>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&amp;display=swap');

    /* ── Blueprint unfold: card expands from horizontal center line ── */
    @keyframes bpUnfold0{
      0%  {clip-path:inset(50% 0 50% 0);opacity:0}
      25% {opacity:1}
      100%{clip-path:inset(0% 0 0% 0);opacity:1}
    }
    @keyframes bpUnfold1{
      0%  {clip-path:inset(50% 0 50% 0);opacity:0}
      25% {opacity:1}
      100%{clip-path:inset(0% 0 0% 0);opacity:1}
    }

    /* ── Card border trace (all four sides) ── */
    @keyframes borderTrace0{
      0%  {stroke-dashoffset:1000}
      100%{stroke-dashoffset:0}
    }

    /* ── Inner accent bar extend ── */
    @keyframes innerAcc{
      0%  {transform:scaleY(0);transform-origin:top}
      60% {transform:scaleY(1.04)}
      100%{transform:scaleY(1)}
    }

    /* ── Grid lines materialize ── */
    @keyframes gridFadeIn{0%{opacity:0}100%{opacity:1}}

    /* ── Corner crosshair draw ── */
    @keyframes crossH{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}

    /* ── Status tag: spring ── */
    @keyframes statusSpring{
      0%  {opacity:0;transform:scale(0.4) translateX(-8px)}
      65% {transform:scale(1.06) translateX(1px)}
      100%{opacity:1;transform:scale(1) translateX(0)}
    }

    /* ── Title reveal: wipe ── */
    @keyframes titleWipe{
      0%  {clip-path:inset(0 100% 0 0)}
      100%{clip-path:inset(0 0% 0 0)}
    }

    /* ── Description: stagger up-fade ── */
    @keyframes descFade{
      0%  {opacity:0;transform:translateY(5px)}
      100%{opacity:1;transform:translateY(0)}
    }

    /* ── Measurement line draw ── */
    @keyframes measDraw{0%{stroke-dashoffset:40}100%{stroke-dashoffset:0}}

    /* ── Tag chip: slide right ── */
    @keyframes chipSlide{
      0%  {opacity:0;transform:translateX(-12px)}
      60% {transform:translateX(2px)}
      100%{opacity:1;transform:translateX(0)}
    }

    /* ── Header decode ── */
    @keyframes hdrDecode{
      0%  {opacity:0;letter-spacing:10px;filter:blur(4px)}
      100%{opacity:1;letter-spacing:3px;filter:blur(0)}
    }

    /* Left accent bar */
    @keyframes accExtend{0%{height:0}100%{height:170px}}

    /* Assign */
    .acc-bar  { animation:accExtend  0.5s ease 0s both }
    .hdr-lbl  { animation:hdrDecode  0.6s ease 0.08s both }

    /* Card 0 */
    .card0-bg    { animation:bpUnfold0   0.7s cubic-bezier(.22,1,.36,1) 0.18s both }
    .border0     { stroke-dasharray:1000; animation:borderTrace0 0.8s ease 0.22s both }
    .inner-acc0  { animation:innerAcc    0.5s ease 0.55s both }
    .grid0       { animation:gridFadeIn  0.4s ease 0.30s both }
    .status0     { animation:statusSpring 0.5s cubic-bezier(.34,1.56,.64,1) 0.75s both; transform-origin:28px 130px }
    .title0      { animation:titleWipe   0.7s steps(28,end) 0.60s both }
    .desc0a      { animation:descFade    0.4s ease 0.80s both }
    .desc0b      { animation:descFade    0.4s ease 0.92s both }
    .chip0       { animation:chipSlide   0.4s ease 1.04s both }
    .meas0       { stroke-dasharray:40;  animation:measDraw   0.3s ease 0.65s both }
    .xhair0      { stroke-dasharray:20;  animation:crossH     0.3s ease 0.50s both }

    /* Card 1 — delayed */
    .card1-bg    { animation:bpUnfold1   0.7s cubic-bezier(.22,1,.36,1) 0.38s both }
    .border1     { stroke-dasharray:1000; animation:borderTrace0 0.8s ease 0.42s both }
    .inner-acc1  { animation:innerAcc    0.5s ease 0.72s both }
    .grid1       { animation:gridFadeIn  0.4s ease 0.50s both }
    .status1     { animation:statusSpring 0.5s cubic-bezier(.34,1.56,.64,1) 0.92s both; transform-origin:426px 130px }
    .title1      { animation:titleWipe   0.7s steps(28,end) 0.78s both }
    .desc1a      { animation:descFade    0.4s ease 0.98s both }
    .desc1b      { animation:descFade    0.4s ease 1.10s both }
    .chip1       { animation:chipSlide   0.4s ease 1.22s both }
    .meas1       { stroke-dasharray:40;  animation:measDraw   0.3s ease 0.82s both }
    .xhair1      { stroke-dasharray:20;  animation:crossH     0.3s ease 0.67s both }

    /* Text styles */
    .hdr   {font-family:'Roboto Mono',monospace;font-size:9px;fill:rgba(74,240,160,0.55);letter-spacing:3px}
    .status{font-family:'Roboto Mono',monospace;font-size:8px;fill:rgba(74,240,160,0.7);letter-spacing:1.5px}
    .ttl   {font-family:'Roboto Mono',monospace;font-size:12px;font-weight:700;fill:#e8e8ea}
    .desc  {font-family:'Roboto Mono',monospace;font-size:9.5px;fill:rgba(232,232,234,0.38);letter-spacing:0.3px}
    .chip  {font-family:'Roboto Mono',monospace;font-size:8px;fill:#4af0a0;text-anchor:middle}
    .coord {font-family:'Roboto Mono',monospace;font-size:7px;fill:rgba(74,240,160,0.25);letter-spacing:0.5px}
  </style>

  <!-- Border rules -->
  <line x1="0" y1="0"   x2="800" y2="0"   stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="0" y1="170" x2="800" y2="170" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Left accent bar -->
  <rect class="acc-bar" x="0" y="0" width="3" fill="#4af0a0" opacity="0.5" filter="url(#accentGlw)"/>

  <!-- Header -->
  <text class="hdr hdr-lbl" x="14" y="20">// RESEARCH</text>

  <!-- ════════════════════ CARD 0 ════════════════════ -->
  <!-- Blueprint grid (very subtle) -->
  <g class="grid0" opacity="0.035">
    <line x1="14"  y1="55"  x2="388" y2="55"  stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="14"  y1="80"  x2="388" y2="80"  stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="14"  y1="105" x2="388" y2="105" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="14"  y1="130" x2="388" y2="130" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="80"  y1="30"  x2="80"  y2="154" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="200" y1="30"  x2="200" y2="154" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="320" y1="30"  x2="320" y2="154" stroke="#4af0a0" stroke-width="0.4"/>
  </g>

  <!-- Card 0 background unfold -->
  <g class="card0-bg">
    <rect x="14" y="30" width="374" height="124" rx="2" fill="rgba(74,240,160,0.02)" stroke="none"/>
  </g>

  <!-- Card 0 border trace -->
  <rect class="border0" x="14" y="30" width="374" height="124" rx="2" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.8"/>

  <!-- Inner accent bar -->
  <rect class="inner-acc0" x="14" y="30" width="3" height="124" rx="1" fill="#4af0a0" opacity="0.6" filter="url(#bpGlow)"/>

  <!-- Coordinate labels (blueprint aesthetic) -->
  <text class="coord" x="16" y="28">0,0</text>
  <text class="coord" x="370" y="28">374,0</text>
  <text class="coord" x="16" y="162">0,124</text>

  <!-- Crosshair corner marker -->
  <line class="xhair0" x1="388" y1="30" x2="388" y2="44" stroke="rgba(74,240,160,0.3)" stroke-width="0.8" stroke-dasharray="20"/>
  <line class="xhair0" x1="374" y1="30" x2="388" y2="30" stroke="rgba(74,240,160,0.3)" stroke-width="0.8" stroke-dasharray="20"/>

  <!-- Measurement tick -->
  <line class="meas0" x1="14" y1="26" x2="388" y2="26" stroke="rgba(74,240,160,0.15)" stroke-width="0.5" stroke-dasharray="40"/>
  <line x1="14"  y1="23" x2="14"  y2="30" stroke="rgba(74,240,160,0.2)" stroke-width="0.5"/>
  <line x1="388" y1="23" x2="388" y2="30" stroke="rgba(74,240,160,0.2)" stroke-width="0.5"/>

  <!-- Status tag -->
  <g class="status0">
    <rect x="28" y="40" width="102" height="14" rx="2" fill="rgba(74,240,160,0.07)" stroke="rgba(74,240,160,0.22)" stroke-width="0.5"/>
    <text class="status" x="79" y="51" text-anchor="middle">THESIS · COMPLETED</text>
  </g>

  <!-- Title -->
  <g class="title0">
    <text class="ttl" x="28" y="76">Climate and Disaster Prediction</text>
  </g>

  <!-- Descriptions -->
  <text class="desc desc0a" x="28" y="96">ML models on time series data</text>
  <text class="desc desc0b" x="28" y="113">Flood · Cyclone · Drought · Wildfire</text>

  <!-- Chip tag -->
  <g class="chip0">
    <rect x="28" y="124" width="70" height="16" rx="2" fill="rgba(74,240,160,0.07)" stroke="rgba(74,240,160,0.2)" stroke-width="0.5"/>
    <text class="chip" x="63" y="136">data-sparse</text>
  </g>

  <!-- ════════════════════ CARD 1 ════════════════════ -->
  <g class="grid1" opacity="0.035">
    <line x1="412" y1="55"  x2="786" y2="55"  stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="412" y1="80"  x2="786" y2="80"  stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="412" y1="105" x2="786" y2="105" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="412" y1="130" x2="786" y2="130" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="480" y1="30"  x2="480" y2="154" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="600" y1="30"  x2="600" y2="154" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="720" y1="30"  x2="720" y2="154" stroke="#4af0a0" stroke-width="0.4"/>
  </g>

  <g class="card1-bg">
    <rect x="412" y="30" width="374" height="124" rx="2" fill="rgba(74,240,160,0.02)" stroke="none"/>
  </g>

  <rect class="border1" x="412" y="30" width="374" height="124" rx="2" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="0.8"/>
  <rect class="inner-acc1" x="412" y="30" width="3" height="124" rx="1" fill="#4af0a0" opacity="0.6" filter="url(#bpGlow)"/>

  <!-- Coordinate labels -->
  <text class="coord" x="414" y="28">412,0</text>
  <text class="coord" x="768" y="28">786,0</text>
  <text class="coord" x="414" y="162">412,124</text>

  <!-- Crosshair -->
  <line class="xhair1" x1="786" y1="30" x2="786" y2="44" stroke="rgba(74,240,160,0.3)" stroke-width="0.8" stroke-dasharray="20"/>
  <line class="xhair1" x1="772" y1="30" x2="786" y2="30" stroke="rgba(74,240,160,0.3)" stroke-width="0.8" stroke-dasharray="20"/>

  <!-- Measurement tick -->
  <line class="meas1" x1="412" y1="26" x2="786" y2="26" stroke="rgba(74,240,160,0.15)" stroke-width="0.5" stroke-dasharray="40"/>
  <line x1="412" y1="23" x2="412" y2="30" stroke="rgba(74,240,160,0.2)" stroke-width="0.5"/>
  <line x1="786" y1="23" x2="786" y2="30" stroke="rgba(74,240,160,0.2)" stroke-width="0.5"/>

  <!-- Status tag -->
  <g class="status1">
    <rect x="426" y="40" width="86" height="14" rx="2" fill="rgba(74,240,160,0.07)" stroke="rgba(74,240,160,0.22)" stroke-width="0.5"/>
    <text class="status" x="469" y="51" text-anchor="middle">PUBLISHED · NLP</text>
  </g>

  <!-- Title -->
  <g class="title1">
    <text class="ttl" x="426" y="76">Gemma-3 on Bangla Instructions</text>
  </g>

  <text class="desc desc1a" x="426" y="96">Dataset quality over model size</text>
  <text class="desc desc1b" x="426" y="113">Low-resource NLP behavior</text>

  <g class="chip1">
    <rect x="426" y="124" width="82" height="16" rx="2" fill="rgba(74,240,160,0.07)" stroke="rgba(74,240,160,0.2)" stroke-width="0.5"/>
    <text class="chip" x="467" y="136">low-resource</text>
  </g>
</svg>
