<svg width="800" height="178" viewBox="0 0 800 178" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes borderDrawV {
      0%   { stroke-dashoffset: 500; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes accentGrow {
      0%   { height: 0; opacity: 0; }
      100% { height: 168px; opacity: 1; }
    }
    @keyframes accentGrow2 {
      0%   { height: 0; opacity: 0; }
      100% { height: 168px; opacity: 1; }
    }
    @keyframes fadeSlide {
      0%   { opacity: 0; transform: translateX(-8px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes dotPulse {
      0%, 100% { r: 3.5; opacity: 1; }
      50%       { r: 5.5; opacity: 0.4; }
    }
    @keyframes tagPop {
      0%   { opacity: 0; transform: scale(0.85); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes scanDown {
      0%   { transform: translateY(-170px); opacity: 0.6; }
      80%  { opacity: 0.6; }
      100% { transform: translateY(170px); opacity: 0; }
    }
    .acc1  { animation: accentGrow  0.7s cubic-bezier(.22,1,.36,1) 0.15s both; }
    .acc2  { animation: accentGrow2 0.7s cubic-bezier(.22,1,.36,1) 0.35s both; }
    .cb1   { stroke-dasharray: 500; animation: borderDrawV 0.9s cubic-bezier(.22,1,.36,1) 0.1s both; }
    .cb2   { stroke-dasharray: 500; animation: borderDrawV 0.9s cubic-bezier(.22,1,.36,1) 0.3s both; }
    .t1a   { animation: fadeSlide 0.5s ease 0.4s both; }
    .t1b   { animation: fadeSlide 0.5s ease 0.52s both; }
    .t1c   { animation: fadeSlide 0.5s ease 0.64s both; }
    .t1d   { animation: fadeSlide 0.5s ease 0.76s both; }
    .t2a   { animation: fadeSlide 0.5s ease 0.55s both; }
    .t2b   { animation: fadeSlide 0.5s ease 0.67s both; }
    .t2c   { animation: fadeSlide 0.5s ease 0.79s both; }
    .t2d   { animation: fadeSlide 0.5s ease 0.91s both; }
    .d1    { animation: dotPulse 2.4s ease-in-out 0s infinite; }
    .d2    { animation: dotPulse 2.4s ease-in-out 0.5s infinite; }
    .tag1  { animation: tagPop 0.4s cubic-bezier(.34,1.56,.64,1) 0.9s both; }
    .tag2  { animation: tagPop 0.4s cubic-bezier(.34,1.56,.64,1) 1.0s both; }
    .tag3  { animation: tagPop 0.4s cubic-bezier(.34,1.56,.64,1) 1.05s both; }
    .tag4  { animation: tagPop 0.4s cubic-bezier(.34,1.56,.64,1) 1.15s both; }
    .scan1 { animation: scanDown 3s ease-in-out 1.2s 1 both; }
    .scan2 { animation: scanDown 3s ease-in-out 1.6s 1 both; }
  </style>

  <!-- Card 1 border -->
  <rect class="cb1" x="1" y="5" width="386" height="168" rx="4" stroke="rgba(255,255,255,0.09)" stroke-width="0.8" fill="none"/>
  <!-- Card 1 accent bar -->
  <rect class="acc1" x="1" y="5" width="2.5" height="168" rx="1" fill="#4af0a0" opacity="0.8"/>

  <!-- scan line card 1 -->
  <clipPath id="clip1"><rect x="1" y="5" width="386" height="168" rx="4"/></clipPath>
  <rect class="scan1" x="1" y="5" width="386" height="1.5" fill="#4af0a0" opacity="0.15" clip-path="url(#clip1)"/>

  <circle class="d1" cx="22" cy="28" r="3.5" fill="#4af0a0"/>
  <text class="t1a" x="34" y="33" font-family="'Courier New',monospace" font-size="9" fill="rgba(74,240,160,0.7)" letter-spacing="2">THESIS  ·  COMPLETED</text>

  <text class="t1b" x="16" y="62" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#e8e8ea">Climate + Disaster</text>
  <text class="t1c" x="16" y="80" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#e8e8ea">Prediction via ML</text>

  <text class="t1d" x="16" y="105" font-family="'Courier New',monospace" font-size="9.5" fill="rgba(232,232,234,0.35)">Time series · Flood · Cyclone</text>
  <text class="t1d" x="16" y="121" font-family="'Courier New',monospace" font-size="9.5" fill="rgba(232,232,234,0.35)">Drought · Wildfire prediction</text>

  <rect class="tag1" x="16" y="140" width="68" height="18" rx="3" fill="rgba(74,240,160,0.1)"/>
  <text class="tag1" x="50" y="153" font-family="'Courier New',monospace" font-size="8.5" fill="#4af0a0" text-anchor="middle">data-sparse</text>

  <rect class="tag2" x="90" y="140" width="62" height="18" rx="3" fill="rgba(74,240,160,0.07)"/>
  <text class="tag2" x="121" y="153" font-family="'Courier New',monospace" font-size="8.5" fill="rgba(74,240,160,0.7)" text-anchor="middle">early-warn</text>

  <!-- Card 2 border -->
  <rect class="cb2" x="413" y="5" width="386" height="168" rx="4" stroke="rgba(255,255,255,0.09)" stroke-width="0.8" fill="none"/>
  <!-- Card 2 accent bar -->
  <rect class="acc2" x="413" y="5" width="2.5" height="168" rx="1" fill="#4af0a0" opacity="0.8"/>

  <!-- scan line card 2 -->
  <clipPath id="clip2"><rect x="413" y="5" width="386" height="168" rx="4"/></clipPath>
  <rect class="scan2" x="413" y="5" width="386" height="1.5" fill="#4af0a0" opacity="0.15" clip-path="url(#clip2)"/>

  <circle class="d2" cx="433" cy="28" r="3.5" fill="#4af0a0"/>
  <text class="t2a" x="445" y="33" font-family="'Courier New',monospace" font-size="9" fill="rgba(74,240,160,0.7)" letter-spacing="2">PUBLISHED  ·  NLP</text>

  <text class="t2b" x="427" y="62" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#e8e8ea">Gemma-3 Fine-tuning</text>
  <text class="t2c" x="427" y="80" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#e8e8ea">on Bangla Instructions</text>

  <text class="t2d" x="427" y="105" font-family="'Courier New',monospace" font-size="9.5" fill="rgba(232,232,234,0.35)">Dataset quality over model size</text>
  <text class="t2d" x="427" y="121" font-family="'Courier New',monospace" font-size="9.5" fill="rgba(232,232,234,0.35)">Low-resource NLP behavior</text>

  <rect class="tag3" x="427" y="140" width="74" height="18" rx="3" fill="rgba(74,240,160,0.1)"/>
  <text class="tag3" x="464" y="153" font-family="'Courier New',monospace" font-size="8.5" fill="#4af0a0" text-anchor="middle">low-resource</text>

  <rect class="tag4" x="507" y="140" width="52" height="18" rx="3" fill="rgba(74,240,160,0.07)"/>
  <text class="tag4" x="533" y="153" font-family="'Courier New',monospace" font-size="8.5" fill="rgba(74,240,160,0.7)" text-anchor="middle">Bangla</text>
</svg>
