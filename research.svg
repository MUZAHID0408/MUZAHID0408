<svg width="800" height="170" viewBox="0 0 800 170" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes drawBorder {
      0%   { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes fadeSlide {
      0%   { opacity: 0; transform: translateX(-6px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes accentGrow {
      0%   { height: 0; opacity: 0; }
      100% { height: 72px; opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { r: 4; opacity: 1; }
      50%       { r: 6; opacity: 0.5; }
    }
    @keyframes tagFade {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    .card1-border { stroke-dasharray: 600; animation: drawBorder 1s cubic-bezier(.22,1,.36,1) 0.2s both; }
    .card2-border { stroke-dasharray: 600; animation: drawBorder 1s cubic-bezier(.22,1,.36,1) 0.5s both; }
    .t1 { animation: fadeSlide 0.6s ease 0.5s both; }
    .t2 { animation: fadeSlide 0.6s ease 0.65s both; }
    .t3 { animation: fadeSlide 0.6s ease 0.8s both; }
    .t4 { animation: fadeSlide 0.6s ease 0.8s both; }
    .t5 { animation: fadeSlide 0.6s ease 0.95s both; }
    .t6 { animation: fadeSlide 0.6s ease 1.1s both; }
    .dot1 { animation: pulse 2.4s ease-in-out 0s infinite; }
    .dot2 { animation: pulse 2.4s ease-in-out 0.4s infinite; }
    .tag1 { animation: tagFade 0.5s ease 0.9s both; }
    .tag2 { animation: tagFade 0.5s ease 1.2s both; }
  </style>

  <!-- Card 1 -->
  <rect class="card1-border" x="1" y="1" width="380" height="158" rx="4" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" fill="rgba(17,17,20,0.0)"/>
  <!-- accent left bar card 1 -->
  <rect x="1" y="1" width="2" height="158" rx="1" fill="#4af0a0" opacity="0.7"/>

  <circle class="dot1" cx="22" cy="24" r="4" fill="#4af0a0"/>
  <text class="t1" x="36" y="29" font-family="'Courier New',monospace" font-size="9" fill="rgba(74,240,160,0.7)" letter-spacing="2">THESIS  ·  COMPLETED</text>

  <text class="t2" x="16" y="58" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#e8e8ea">Climate & Disaster</text>
  <text class="t3" x="16" y="76" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#e8e8ea">Prediction via ML</text>

  <text class="t4" x="16" y="100" font-family="'Courier New',monospace" font-size="9.5" fill="rgba(232,232,234,0.38)">Time series · Flood · Cyclone</text>
  <text class="t4" x="16" y="116" font-family="'Courier New',monospace" font-size="9.5" fill="rgba(232,232,234,0.38)">Drought · Wildfire prediction</text>

  <rect class="tag1" x="16" y="132" width="62" height="18" rx="3" fill="rgba(74,240,160,0.1)"/>
  <text class="tag1" x="47" y="145" font-family="'Courier New',monospace" font-size="8.5" fill="#4af0a0" text-anchor="middle">data-sparse</text>

  <rect class="tag1" x="84" y="132" width="58" height="18" rx="3" fill="rgba(74,240,160,0.08)"/>
  <text class="tag1" x="113" y="145" font-family="'Courier New',monospace" font-size="8.5" fill="rgba(74,240,160,0.7)" text-anchor="middle">early-warn</text>

  <!-- Card 2 -->
  <rect class="card2-border" x="411" y="1" width="380" height="158" rx="4" stroke="rgba(255,255,255,0.1)" stroke-width="0.8" fill="rgba(17,17,20,0.0)"/>
  <rect x="411" y="1" width="2" height="158" rx="1" fill="#4af0a0" opacity="0.7"/>

  <circle class="dot2" cx="432" cy="24" r="4" fill="#4af0a0"/>
  <text class="t4" x="446" y="29" font-family="'Courier New',monospace" font-size="9" fill="rgba(74,240,160,0.7)" letter-spacing="2">PUBLISHED  ·  NLP</text>

  <text class="t5" x="426" y="58" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#e8e8ea">Gemma-3 Fine-tuning</text>
  <text class="t6" x="426" y="76" font-family="'Courier New',monospace" font-size="12" font-weight="700" fill="#e8e8ea">on Bangla Instructions</text>

  <text class="t6" x="426" y="100" font-family="'Courier New',monospace" font-size="9.5" fill="rgba(232,232,234,0.38)">Dataset composition over model</text>
  <text class="t6" x="426" y="116" font-family="'Courier New',monospace" font-size="9.5" fill="rgba(232,232,234,0.38)">size · Low-resource behavior</text>

  <rect class="tag2" x="426" y="132" width="68" height="18" rx="3" fill="rgba(74,240,160,0.1)"/>
  <text class="tag2" x="460" y="145" font-family="'Courier New',monospace" font-size="8.5" fill="#4af0a0" text-anchor="middle">low-resource</text>

  <rect class="tag2" x="500" y="132" width="50" height="18" rx="3" fill="rgba(74,240,160,0.08)"/>
  <text class="tag2" x="525" y="145" font-family="'Courier New',monospace" font-size="8.5" fill="rgba(74,240,160,0.7)" text-anchor="middle">Bangla</text>
</svg>
