<svg width="800" height="156" viewBox="0 0 800 156" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="termGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="philoGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&amp;display=swap');

    /* ── Top rule: dual-wave frequency decay sweep ── */
    @keyframes sweepL{
      0%  {stroke-dashoffset:850;opacity:0}
      8%  {opacity:1}
      100%{stroke-dashoffset:0}
    }
    @keyframes sweepR{
      0%  {stroke-dashoffset:-850;opacity:0}
      8%  {opacity:1}
      100%{stroke-dashoffset:0}
    }

    /* ── Tick marks: rapid-fire sequence ── */
    @keyframes tickRapid{
      0%  {opacity:0;transform:scaleY(0)}
      50% {opacity:1;transform:scaleY(1.3)}
      100%{opacity:0.5;transform:scaleY(1)}
    }

    /* ── Philosophy: wave interference resolve
       starts as two offset ghost copies that converge into one sharp line ── */
    @keyframes waveA{
      0%  {opacity:0;transform:translateY(-8px);filter:blur(3px)}
      40% {opacity:0.6;transform:translateY(-2px);filter:blur(1px)}
      100%{opacity:0;transform:translateY(0);filter:blur(0)}
    }
    @keyframes waveB{
      0%  {opacity:0;transform:translateY(8px);filter:blur(3px)}
      40% {opacity:0.6;transform:translateY(2px);filter:blur(1px)}
      100%{opacity:0;transform:translateY(0);filter:blur(0)}
    }
    @keyframes philoResolve{
      0%  {opacity:0;filter:blur(6px)}
      35% {opacity:0}
      60% {opacity:0.5;filter:blur(2px)}
      100%{opacity:1;filter:blur(0)}
    }

    /* ── Idle shimmer for philosophy ── */
    @keyframes philoShimmer{
      0%,100%{opacity:0.26}
      50%    {opacity:0.48}
    }

    /* ── University: scan reveal (horizontal) ── */
    @keyframes uniScan{
      0%  {clip-path:inset(0 100% 0 0);opacity:0}
      6%  {opacity:1}
      100%{clip-path:inset(0 0% 0 0)}
    }

    /* ── Email: decode from scramble ── */
    @keyframes emailDecl{
      0%  {opacity:0;letter-spacing:8px;filter:blur(3px)}
      50% {opacity:0.6;letter-spacing:2px;filter:blur(1px)}
      100%{opacity:1;letter-spacing:1px;filter:blur(0)}
    }

    /* ── Divider: center-out ── */
    @keyframes divCenter{
      0%  {clip-path:inset(0 50% 0 50%)}
      100%{clip-path:inset(0 0% 0 0%)}
    }

    /* ── Terminal: multi-segment typewriter with per-segment delays ── */
    @keyframes segType{
      0%  {clip-path:inset(0 100% 0 0);opacity:0}
      5%  {opacity:1}
      100%{clip-path:inset(0 0% 0 0)}
    }

    /* ── Cursor blink ── */
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* ── Bottom rule fade ── */
    @keyframes botRule{0%{opacity:0}100%{opacity:1}}

    /* Assignments */
    .rule-t-l { stroke-dasharray:850; animation:sweepL 0.9s cubic-bezier(.22,1,.36,1) 0.0s both }
    .rule-t-r { stroke-dasharray:850; animation:sweepR 0.9s cubic-bezier(.22,1,.36,1) 0.0s both }
    .rule-b   { animation:botRule 0.5s ease 1.6s both }

    .tk0 { animation:tickRapid 0.4s ease 0.52s both; transform-origin:160px 1px }
    .tk1 { animation:tickRapid 0.4s ease 0.60s both; transform-origin:320px 1px }
    .tk2 { animation:tickRapid 0.4s ease 0.68s both; transform-origin:480px 1px }
    .tk3 { animation:tickRapid 0.4s ease 0.76s both; transform-origin:640px 1px }

    /* Interference ghost waves (on top of philosophy text) */
    .wave-a  { animation:waveA        0.9s ease 0.4s both }
    .wave-b  { animation:waveB        0.9s ease 0.4s both }
    .philo   { animation:philoResolve 1.2s ease 0.4s both }
    .philo-sh{ animation:philoShimmer 5.5s ease-in-out 1.9s infinite }

    .univ    { animation:uniScan    0.9s steps(44,end) 0.95s both }
    .div-c   { animation:divCenter  0.5s ease 1.05s both }
    .email   { animation:emailDecl  0.7s ease 1.20s both }

    /* Terminal segments */
    .seg-user{ animation:segType 0.5s steps(8,end) 1.10s both }
    .seg-host{ animation:segType 0.3s steps(5,end) 1.35s both }
    .seg-path{ animation:segType 0.7s steps(18,end) 1.50s both }
    .seg-cmd { animation:segType 0.2s steps(3,end) 1.95s both }
    .seg-msg { animation:segType 1.0s steps(25,end) 2.05s both }
    .cur     { animation:blink   1.1s step-end 2.8s infinite }

    /* Typography */
    .phil-txt{font-family:'Roboto Mono',monospace;font-size:13.5px;font-style:italic;font-weight:300;fill:rgba(232,232,234,0.26);text-anchor:middle;letter-spacing:0.4px}
    .univ-txt{font-family:'Roboto Mono',monospace;font-size:9px;font-weight:300;fill:rgba(232,232,234,0.16);text-anchor:middle;letter-spacing:2px}
    .mail-txt{font-family:'Roboto Mono',monospace;font-size:9px;fill:rgba(232,232,234,0.13);text-anchor:middle;letter-spacing:1px}
    .term    {font-family:'Roboto Mono',monospace;font-size:12px}
  </style>

  <!-- Top rule: dual sweep from center -->
  <line class="rule-t-l" x1="0"   y1="1" x2="400" y2="1" stroke="rgba(255,255,255,0.09)" stroke-width="0.6"/>
  <line class="rule-t-r" x1="400" y1="1" x2="800" y2="1" stroke="rgba(255,255,255,0.09)" stroke-width="0.6"/>

  <!-- Frequency signal on top rule (oscilloscope motif) -->
  <path stroke="rgba(74,240,160,0.18)" stroke-width="0.7" fill="none"
    d="M0,1 L60,1 L65,-3 L70,5 L75,-3 L80,5 L83,1 L160,1 L163,-2 L167,4 L170,1 L320,1 L323,-2 L327,4 L330,1 L480,1 L483,-1 L487,3 L490,1 L640,1 L642,-1 L646,3 L648,1 L800,1">
    <animate attributeName="stroke-dasharray" from="850" to="850"/>
    <animate attributeName="stroke-dashoffset" from="850" to="0" dur="0.9s" begin="0s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
  </path>

  <!-- Tick marks on top rule -->
  <line class="tk0" x1="160" y1="1" x2="160" y2="9" stroke="#4af0a0" stroke-width="1.2" opacity="0.4"/>
  <line class="tk1" x1="320" y1="1" x2="320" y2="9" stroke="#4af0a0" stroke-width="1.2" opacity="0.4"/>
  <line class="tk2" x1="480" y1="1" x2="480" y2="9" stroke="#4af0a0" stroke-width="1.2" opacity="0.4"/>
  <line class="tk3" x1="640" y1="1" x2="640" y2="9" stroke="#4af0a0" stroke-width="1.2" opacity="0.4"/>

  <!-- Philosophy: wave interference ghosts then resolve -->
  <text class="wave-a phil-txt" x="400" y="46">Learn deeply. Build purposefully. Improve constantly.</text>
  <text class="wave-b phil-txt" x="400" y="46">Learn deeply. Build purposefully. Improve constantly.</text>
  <g class="philo philo-sh">
    <text class="phil-txt" x="400" y="46" filter="url(#philoGlow)">Learn deeply. Build purposefully. Improve constantly.</text>
  </g>

  <!-- University info -->
  <g class="univ">
    <text class="univ-txt" x="400" y="70">B.SC CSE  ·  GREEN UNIVERSITY OF BANGLADESH  ·  GRADUATE</text>
  </g>

  <!-- Divider -->
  <g class="div-c">
    <line x1="280" y1="82" x2="520" y2="82" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  </g>

  <!-- Email -->
  <text class="mail-txt email" x="400" y="100">mdmuzahid0408@gmail.com</text>

  <!-- Terminal prompt — multi-segment type sequence -->
  <g>
    <!-- segment: username -->
    <g class="seg-user">
      <text class="term" x="96" y="134">
        <tspan fill="#4af0a0" font-weight="600" filter="url(#termGlow)">muzahid</tspan>
      </text>
    </g>
    <!-- @ -->
    <g class="seg-host">
      <text class="term" x="189" y="134">
        <tspan fill="rgba(232,232,234,0.22)">@dev</tspan>
      </text>
    </g>
    <!-- path -->
    <g class="seg-path">
      <text class="term" x="237" y="134">
        <tspan fill="rgba(74,160,240,0.65)" filter="url(#termGlow)">:~/open-to-collab</tspan>
      </text>
    </g>
    <!-- $ -->
    <g class="seg-cmd">
      <text class="term" x="460" y="134">
        <tspan fill="rgba(232,232,234,0.22)"> $ </tspan>
      </text>
    </g>
    <!-- message -->
    <g class="seg-msg">
      <text class="term" x="487" y="134">
        <tspan fill="rgba(232,232,234,0.42)">reach out — ML · web · mobile</tspan>
      </text>
    </g>
  </g>

  <!-- Blinking cursor -->
  <rect class="cur" x="694" y="119" width="8" height="17" rx="1" fill="#4af0a0" opacity="0.8" filter="url(#termGlow)"/>

  <!-- Bottom rule -->
  <line class="rule-b" x1="0" y1="155" x2="800" y2="155" stroke="rgba(255,255,255,0.04)" stroke-width="0.4"/>
</svg>
