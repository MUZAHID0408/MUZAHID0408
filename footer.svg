<svg width="800" height="148" viewBox="0 0 800 148" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Typewriter for prompt */
    @keyframes type{0%{clip-path:inset(0 100% 0 0)}100%{clip-path:inset(0 0% 0 0)}}
    /* Evaporate — blur dissolve */
    @keyframes evap{0%{opacity:0;filter:blur(12px)}100%{opacity:1;filter:blur(0)}}
    /* Swipe reveal — philosophy */
    @keyframes wipe{0%{clip-path:inset(0 100% 0 0)}100%{clip-path:inset(0 0% 0 0)}}
    /* Cursor blink */
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    /* Line draw */
    @keyframes lineD{0%{stroke-dashoffset:850}100%{stroke-dashoffset:0}}
    /* Tick mark drop */
    @keyframes tickD{0%{opacity:0;transform:scaleY(0)}100%{opacity:1;transform:scaleY(1)}}
    /* Shimmer breathe on philosophy */
    @keyframes shimmer{0%,100%{opacity:0.22}50%{opacity:0.48}}

    .tl{stroke-dasharray:850;animation:lineD 1s ease 0s both}
    .bl{stroke-dasharray:850;animation:lineD 1s ease 0.1s both}

    .tk0{animation:tickD 0.3s ease 0.5s both;transform-origin:top}
    .tk1{animation:tickD 0.3s ease 0.6s both;transform-origin:top}
    .tk2{animation:tickD 0.3s ease 0.7s both;transform-origin:top}
    .tk3{animation:tickD 0.3s ease 0.8s both;transform-origin:top}

    .phil{animation:wipe    0.9s steps(48,end) 0.4s both}
    .sh  {animation:shimmer 5s ease-in-out 1.6s infinite}
    .univ{animation:evap    0.8s ease 0.9s both}
    .mail{animation:evap    0.8s ease 1.2s both}
    .term{animation:type    1.4s steps(40,end) 1.0s both}
    .cur {animation:blink   1.1s step-end infinite}
  </style>

  <!-- Rules -->
  <line class="tl" x1="0" y1="1"   x2="800" y2="1"   stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line class="bl" x1="0" y1="147" x2="800" y2="147" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <!-- Tick marks on top rule -->
  <line class="tk0" x1="160" y1="1" x2="160" y2="8" stroke="#4af0a0" stroke-width="1" opacity="0.35"/>
  <line class="tk1" x1="320" y1="1" x2="320" y2="8" stroke="#4af0a0" stroke-width="1" opacity="0.35"/>
  <line class="tk2" x1="480" y1="1" x2="480" y2="8" stroke="#4af0a0" stroke-width="1" opacity="0.35"/>
  <line class="tk3" x1="640" y1="1" x2="640" y2="8" stroke="#4af0a0" stroke-width="1" opacity="0.35"/>

  <!-- Philosophy — swipe reveal then shimmer -->
  <g class="phil sh">
    <text x="400" y="44" font-family="'Roboto Mono',monospace" font-size="14" font-style="italic" font-weight="300" fill="rgba(232,232,234,0.22)" text-anchor="middle" letter-spacing="0.5">Learn deeply. Build purposefully. Improve constantly.</text>
  </g>

  <!-- University -->
  <text class="univ" x="400" y="68" font-family="'Roboto Mono',monospace" font-size="9" font-weight="300" fill="rgba(232,232,234,0.16)" text-anchor="middle" letter-spacing="2">B.SC CSE  .  GREEN UNIVERSITY OF BANGLADESH  .  GRADUATE</text>

  <!-- Divider -->
  <line x1="280" y1="80" x2="520" y2="80" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- Email -->
  <text class="mail" x="400" y="98" font-family="'Roboto Mono',monospace" font-size="9" fill="rgba(232,232,234,0.14)" text-anchor="middle" letter-spacing="1">mdmuzahid0408@gmail.com</text>

  <!-- Terminal prompt — typewriter -->
  <g class="term">
    <text x="96" y="130" font-family="'Roboto Mono',monospace" font-size="12">
      <tspan fill="#4af0a0" font-weight="600">muzahid</tspan><tspan fill="rgba(232,232,234,0.2)">@dev</tspan><tspan fill="rgba(74,160,240,0.6)">:~/open-to-collab</tspan><tspan fill="rgba(232,232,234,0.2)"> $ </tspan><tspan fill="rgba(232,232,234,0.38)">reach out — ML . web . mobile</tspan>
    </text>
  </g>
  <!-- Blinking cursor -->
  <rect class="cur" x="672" y="116" width="8" height="16" rx="1" fill="#4af0a0" opacity="0.8"/>
</svg>
