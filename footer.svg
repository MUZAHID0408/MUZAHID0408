<svg width="800" height="150" viewBox="0 0 800 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes drawLine {
      0%   { stroke-dashoffset: 850; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.07; }
      50%       { opacity: 0.18; }
    }
    @keyframes shimmer {
      0%   { opacity: 0.18; }
      50%  { opacity: 0.38; }
      100% { opacity: 0.18; }
    }
    @keyframes typeIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    .tline    { stroke-dasharray: 850; animation: drawLine 1.2s ease 0s both; }
    .phil     { animation: fadeUp 0.7s ease 0.2s both; }
    .uni      { animation: fadeUp 0.6s ease 0.5s both; }
    .prompt   { animation: fadeUp 0.6s ease 0.8s both; }
    .cursor   { animation: blink 1.1s step-end infinite; }
    .glow     { animation: glowPulse 3.5s ease-in-out infinite; }
    .shimtxt  { animation: shimmer 5s ease-in-out 1s infinite; }
  </style>

  <line class="tline" x1="0" y1="1" x2="800" y2="1" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <ellipse cx="400" cy="50" rx="260" ry="28" fill="#4af0a0" class="glow"/>

  <text class="phil shimtxt" x="400" y="50" font-family="'Courier New',monospace" font-size="15" font-style="italic" font-weight="300" fill="rgba(232,232,234,0.22)" text-anchor="middle" letter-spacing="0.5">
    Learn deeply. Build purposefully. Improve constantly.
  </text>

  <text class="uni" x="400" y="82" font-family="'Courier New',monospace" font-size="9" fill="rgba(232,232,234,0.18)" text-anchor="middle" letter-spacing="2">
    B.SC CSE  ·  GREEN UNIVERSITY OF BANGLADESH  ·  THESIS COMPLETED  ·  GRADUATE
  </text>

  <g class="prompt">
    <text x="400" y="120" font-family="'Courier New',monospace" font-size="11.5" text-anchor="middle">
      <tspan fill="#4af0a0" font-weight="600">muzahid</tspan><tspan fill="rgba(232,232,234,0.2)">@</tspan><tspan fill="rgba(240,184,74,0.6)">dev</tspan><tspan fill="rgba(232,232,234,0.2)">:</tspan><tspan fill="rgba(74,160,240,0.6)">~/open-to-collab</tspan><tspan fill="rgba(232,232,234,0.2)"> $ </tspan><tspan fill="rgba(232,232,234,0.38)">reach out — ML · web · mobile</tspan>
    </text>
    <rect class="cursor" x="596" y="107" width="7" height="14" rx="1" fill="#4af0a0" opacity="0.85"/>
  </g>

  <line x1="0" y1="149" x2="800" y2="149" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
</svg>
