<svg width="800" height="150" viewBox="0 0 800 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Typewriter for terminal prompt */
    @keyframes typewrite {
      0%   { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0%   0 0); }
    }
    /* Evaporate for philosophy */
    @keyframes evap {
      0%   { opacity:0; filter:blur(10px); }
      100% { opacity:1; filter:blur(0);    }
    }
    /* Cursor blink */
    @keyframes blink {
      0%,100% { opacity:1; }
      50%      { opacity:0; }
    }
    /* Shimmer loop on philosophy */
    @keyframes shimmer {
      0%,100% { opacity:0.2; }
      50%      { opacity:0.42; }
    }
    /* Top line draw */
    @keyframes drawLine {
      0%   { stroke-dashoffset:850; }
      100% { stroke-dashoffset:0; }
    }
    /* University fade */
    @keyframes fadeIn {
      0%   { opacity:0; }
      100% { opacity:1; }
    }

    .tline  { stroke-dasharray:850; animation: drawLine  1s ease 0s both; }
    .phil   { animation: evap    0.9s ease 0.3s both; }
    .univ   { animation: fadeIn  0.7s ease 0.8s both; }
    .term   { animation: typewrite 1.4s steps(38,end) 1.1s both; }
    .cursor { animation: blink   1.1s step-end infinite; }
    .sh     { animation: shimmer 5s ease-in-out 1.5s infinite; }
  </style>

  <line class="tline" x1="0" y1="1" x2="800" y2="1" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Philosophy -->
  <text class="phil sh" x="400" y="48" font-family="'Roboto Mono',monospace" font-size="14" font-style="italic" font-weight="300" fill="rgba(232,232,234,0.22)" text-anchor="middle" letter-spacing="0.5">
    Learn deeply. Build purposefully. Improve constantly.
  </text>

  <!-- University block -->
  <text class="univ" x="400" y="76" font-family="'Roboto Mono',monospace" font-size="9" font-weight="300" fill="rgba(232,232,234,0.18)" text-anchor="middle" letter-spacing="2">
    B.SC CSE  .  GREEN UNIVERSITY OF BANGLADESH  .  GRADUATE
  </text>

  <!-- Terminal prompt — typewriter -->
  <g class="term">
    <text x="110" y="118" font-family="'Roboto Mono',monospace" font-size="12" text-anchor="start">
      <tspan fill="#4af0a0" font-weight="600">muzahid</tspan><tspan fill="rgba(232,232,234,0.2)">@dev</tspan><tspan fill="rgba(74,160,240,0.65)">:~/open-to-collab</tspan><tspan fill="rgba(232,232,234,0.2)"> $ </tspan><tspan fill="rgba(232,232,234,0.4)">reach out — ML . web . mobile</tspan>
    </text>
  </g>
  <rect class="cursor" x="683" y="105" width="8" height="15" rx="1" fill="#4af0a0" opacity="0.85"/>

  <!-- Email -->
  <text x="400" y="142" font-family="'Roboto Mono',monospace" font-size="9" fill="rgba(232,232,234,0.15)" text-anchor="middle" letter-spacing="1">
    mdmuzahid0408@gmail.com
  </text>

  <line x1="0" y1="149" x2="800" y2="149" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
</svg>
