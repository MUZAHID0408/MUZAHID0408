<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="scanNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="nameClip">
      <rect x="60" y="60" width="520" height="80"/>
    </clipPath>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&amp;display=swap');

    /* ── Signal oscilloscope sweep ── */
    @keyframes sigSweep{
      0%  {stroke-dashoffset:1200;opacity:0}
      8%  {opacity:1}
      100%{stroke-dashoffset:0;opacity:1}
    }
    /* ── Baseline signal idle oscillate ── */
    @keyframes sigIdle{
      0%,100%{d:path("M0,100 Q100,100 200,100 Q300,100 400,100 Q500,100 600,100 Q700,100 800,100")}
      25%    {d:path("M0,100 Q100,92 200,100 Q300,108 400,100 Q500,92 600,100 Q700,108 800,100")}
      50%    {d:path("M0,100 Q100,100 200,100 Q300,100 400,100 Q500,100 600,100 Q700,100 800,100")}
      75%    {d:path("M0,100 Q100,108 200,100 Q300,92 400,100 Q500,108 600,100 Q700,92 800,100")}
    }

    /* ── Grid lines materialize ── */
    @keyframes gridFade{0%{opacity:0}100%{opacity:1}}

    /* ── Corner bracket draw ── */
    @keyframes brkTL{0%{stroke-dashoffset:60}100%{stroke-dashoffset:0}}
    @keyframes brkBR{0%{stroke-dashoffset:60}100%{stroke-dashoffset:0}}

    /* ── Glitch slice: name letters resolve from noise ── */
    @keyframes glitch0{
      0%  {opacity:0;transform:translateX(-40px);filter:blur(8px)}
      12% {opacity:1;transform:translateX(4px) skewX(-6deg);filter:blur(3px)}
      20% {transform:translateX(-2px) skewX(3deg);filter:blur(1px)}
      30% {transform:translateX(1px);filter:blur(0)}
      100%{opacity:1;transform:translateX(0);filter:blur(0)}
    }
    @keyframes glitch1{
      0%  {opacity:0;transform:translateX(40px);filter:blur(8px)}
      14% {opacity:1;transform:translateX(-3px) skewX(5deg);filter:blur(2px)}
      24% {transform:translateX(2px) skewX(-2deg);filter:blur(0.5px)}
      32% {transform:translateX(0);filter:blur(0)}
      100%{opacity:1;transform:translateX(0);filter:blur(0)}
    }
    @keyframes glitch2{
      0%  {opacity:0;transform:translateY(-30px);filter:blur(6px)}
      16% {opacity:1;transform:translateY(3px) skewY(-4deg);filter:blur(1.5px)}
      26% {transform:translateY(-1px);filter:blur(0)}
      100%{opacity:1;transform:translateY(0);filter:blur(0)}
    }
    @keyframes glitch3{
      0%  {opacity:0;transform:translateY(30px);filter:blur(6px)}
      18% {opacity:1;transform:translateY(-4px) skewY(3deg);filter:blur(1px)}
      28% {transform:translateY(1px);filter:blur(0)}
      100%{opacity:1;transform:translateY(0);filter:blur(0)}
    }
    @keyframes glitch4{
      0%  {opacity:0;transform:translateX(-25px) translateY(15px);filter:blur(7px)}
      20% {opacity:1;transform:translateX(2px) skewX(4deg);filter:blur(2px)}
      30% {transform:translateX(-1px);filter:blur(0)}
      100%{opacity:1;transform:translateX(0);filter:blur(0)}
    }
    @keyframes glitch5{
      0%  {opacity:0;transform:scaleX(2.5);filter:blur(10px)}
      22% {opacity:1;transform:scaleX(0.97);filter:blur(1px)}
      32% {transform:scaleX(1.01)}
      40% {transform:scaleX(1)}
      100%{opacity:1;transform:scaleX(1);filter:blur(0)}
    }
    @keyframes glitch6{
      0%  {opacity:0;transform:translateX(25px) scaleX(0.3);filter:blur(8px)}
      24% {opacity:1;transform:translateX(-2px) scaleX(1.04);filter:blur(1.5px)}
      34% {transform:translateX(0) scaleX(0.99);filter:blur(0)}
      100%{opacity:1;transform:translateX(0);filter:blur(0)}
    }

    /* ── Accent dot pulse after name resolves ── */
    @keyframes dotPulse{
      0%  {opacity:0;transform:scale(0)}
      60% {transform:scale(1.15)}
      80% {transform:scale(0.95)}
      100%{opacity:1;transform:scale(1)}
    }

    /* ── Cursor blink ── */
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* ── Role: character-by-character scan reveal ── */
    @keyframes scanReveal{
      0%  {clip-path:inset(0 100% 0 0);opacity:0}
      5%  {opacity:1}
      100%{clip-path:inset(0 0% 0 0);opacity:1}
    }

    /* ── Sub-info: stagger up-fade ── */
    @keyframes upFade{
      0%  {opacity:0;transform:translateY(8px)}
      100%{opacity:1;transform:translateY(0)}
    }

    /* ── Horizontal rule scan ── */
    @keyframes ruleL{0%{stroke-dashoffset:820}100%{stroke-dashoffset:0}}
    @keyframes ruleR{0%{stroke-dashoffset:-820}100%{stroke-dashoffset:0}}

    /* ── Tick sequencer ── */
    @keyframes tickSeq{0%{transform:scaleY(0);opacity:0}60%{transform:scaleY(1.2)}100%{transform:scaleY(1);opacity:1}}

    /* ── Scanline sweep overlay ── */
    @keyframes scanline{
      0%  {transform:translateY(-200px);opacity:0.6}
      100%{transform:translateY(200px);opacity:0}
    }

    /* Assign animations */
    .grid-h { animation:gridFade 0.4s ease 0.05s both }
    .grid-v { animation:gridFade 0.4s ease 0.12s both }

    .brk-tl { stroke-dasharray:60; animation:brkTL 0.4s ease 0.02s both }
    .brk-br { stroke-dasharray:60; animation:brkBR 0.4s ease 0.08s both }

    .sig { stroke-dasharray:1200; animation:sigSweep 1.1s cubic-bezier(.16,1,.3,1) 0.0s both }

    .l0 { animation:glitch0 0.8s cubic-bezier(.22,1,.36,1) 0.55s both; transform-origin:80px 105px }
    .l1 { animation:glitch1 0.8s cubic-bezier(.22,1,.36,1) 0.63s both; transform-origin:126px 105px }
    .l2 { animation:glitch2 0.8s cubic-bezier(.22,1,.36,1) 0.71s both; transform-origin:172px 105px }
    .l3 { animation:glitch3 0.8s cubic-bezier(.22,1,.36,1) 0.79s both; transform-origin:218px 105px }
    .l4 { animation:glitch4 0.8s cubic-bezier(.22,1,.36,1) 0.87s both; transform-origin:265px 105px }
    .l5 { animation:glitch5 0.8s cubic-bezier(.22,1,.36,1) 0.95s both; transform-origin:312px 105px }
    .l6 { animation:glitch6 0.8s cubic-bezier(.22,1,.36,1) 1.03s both; transform-origin:345px 105px }

    .dot-acc { animation:dotPulse 0.5s cubic-bezier(.34,1.56,.64,1) 1.4s both; transform-origin:388px 105px }

    .cur { animation:blink 1.1s step-end 1.6s infinite }

    .rule-l { stroke-dasharray:820; animation:ruleL 0.9s cubic-bezier(.22,1,.36,1) 0.8s both }
    .rule-r { stroke-dasharray:820; animation:ruleR 0.9s cubic-bezier(.22,1,.36,1) 0.8s both }

    .tk0 { animation:tickSeq 0.25s ease 0.85s both; transform-origin:200px 56px }
    .tk1 { animation:tickSeq 0.25s ease 0.92s both; transform-origin:400px 56px }
    .tk2 { animation:tickSeq 0.25s ease 0.99s both; transform-origin:600px 56px }

    .role { animation:scanReveal 1.1s steps(30,end) 1.3s both }
    .sub0 { animation:upFade 0.6s ease 1.55s both }
    .sub1 { animation:upFade 0.6s ease 1.72s both }

    .scan { animation:scanline 0.55s linear 0.45s both }
  </style>

  <!-- Background grid — very subtle engineering grid -->
  <g class="grid-h" opacity="0.04">
    <line x1="0" y1="50"  x2="800" y2="50"  stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#4af0a0" stroke-width="0.4"/>
  </g>
  <g class="grid-v" opacity="0.03">
    <line x1="133" y1="0" x2="133" y2="200" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="266" y1="0" x2="266" y2="200" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="533" y1="0" x2="533" y2="200" stroke="#4af0a0" stroke-width="0.4"/>
    <line x1="666" y1="0" x2="666" y2="200" stroke="#4af0a0" stroke-width="0.4"/>
  </g>

  <!-- Scanline sweep effect on load -->
  <rect class="scan" x="0" y="0" width="800" height="4" fill="rgba(74,240,160,0.06)"/>

  <!-- Corner brackets -->
  <path class="brk-tl" d="M22 36 L22 12 L58 12" stroke="#4af0a0" stroke-width="1.4" fill="none" opacity="0.7"/>
  <path class="brk-tl" d="M778 36 L778 12 L742 12" stroke="#4af0a0" stroke-width="1.4" fill="none" opacity="0.7"/>
  <path class="brk-br" d="M22 164 L22 188 L58 188" stroke="#4af0a0" stroke-width="1.4" fill="none" opacity="0.7"/>
  <path class="brk-br" d="M778 164 L778 188 L742 188" stroke="#4af0a0" stroke-width="1.4" fill="none" opacity="0.7"/>

  <!-- Signal oscilloscope sweep on top rule position -->
  <path class="sig" d="M24 56 L80 56 L86 44 L92 68 L98 44 L104 68 L108 56 L160 56 L164 50 L168 62 L172 56 L220 56 L224 48 L228 64 L232 56 L400 56 L404 52 L408 60 L412 56 L600 56 L604 50 L608 62 L612 56 L784 56"
    stroke="#4af0a0" stroke-width="1" fill="none" opacity="0.6" filter="url(#glowSm)"/>

  <!-- Bottom rule -->
  <line class="rule-r" x1="24" y1="145" x2="784" y2="145" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>

  <!-- Tick marks -->
  <line class="tk0" x1="200" y1="52" x2="200" y2="60" stroke="#4af0a0" stroke-width="1.2" opacity="0.5"/>
  <line class="tk1" x1="400" y1="52" x2="400" y2="60" stroke="#4af0a0" stroke-width="1.2" opacity="0.5"/>
  <line class="tk2" x1="600" y1="52" x2="600" y2="60" stroke="#4af0a0" stroke-width="1.2" opacity="0.5"/>

  <!-- NAME — glitch-resolve per-letter -->
  <text class="l0" x="80"  y="122" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea" filter="url(#glowSm)">M</text>
  <text class="l1" x="126" y="122" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea" filter="url(#glowSm)">U</text>
  <text class="l2" x="172" y="122" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea" filter="url(#glowSm)">Z</text>
  <text class="l3" x="218" y="122" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea" filter="url(#glowSm)">A</text>
  <text class="l4" x="265" y="122" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea" filter="url(#glowSm)">H</text>
  <text class="l5" x="312" y="122" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea" filter="url(#glowSm)">I</text>
  <text class="l6" x="345" y="122" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea" filter="url(#glowSm)">D</text>

  <!-- Accent dot + blinking cursor -->
  <text class="dot-acc" x="392" y="122" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#4af0a0" filter="url(#glow)">.</text>
  <rect class="cur" x="426" y="70" width="9" height="54" rx="1" fill="#4af0a0" opacity="0.75" filter="url(#glowSm)"/>

  <!-- Role — horizontal scan reveal -->
  <g class="role">
    <text x="400" y="164" font-family="'Roboto Mono',monospace" font-size="10" font-weight="400"
      fill="rgba(232,232,234,0.32)" text-anchor="middle" letter-spacing="5.5">RESEARCHER  ·  DEVELOPER  ·  GRADUATE</text>
  </g>

  <!-- Sub info — stagger up-fade -->
  <text class="sub0" x="400" y="179" font-family="'Roboto Mono',monospace" font-size="9" font-weight="300"
    fill="rgba(74,240,160,0.45)" text-anchor="middle" letter-spacing="3">GREEN UNIVERSITY OF BANGLADESH  ·  CSE</text>
  <text class="sub1" x="400" y="193" font-family="'Roboto Mono',monospace" font-size="8.5" font-weight="300"
    fill="rgba(232,232,234,0.15)" text-anchor="middle" letter-spacing="1">mdmuzahid0408@gmail.com</text>
</svg>
