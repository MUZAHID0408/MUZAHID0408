<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&amp;display=swap');
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    /* Scramble/jitter — each letter offsets then settles */
    @keyframes jitter0 { 0%{opacity:0;transform:translateY(-18px) skewX(20deg)} 60%{transform:translateY(3px) skewX(-4deg)} 80%{transform:translateY(-1px)} 100%{opacity:1;transform:translateY(0) skewX(0)} }
    @keyframes jitter1 { 0%{opacity:0;transform:translateY(20px) skewX(-18deg)} 60%{transform:translateY(-4px) skewX(5deg)} 80%{transform:translateY(2px)} 100%{opacity:1;transform:translateY(0) skewX(0)} }
    @keyframes jitter2 { 0%{opacity:0;transform:translateY(-14px) skewX(14deg)} 55%{transform:translateY(4px) skewX(-3deg)} 80%{transform:translateY(-1px)} 100%{opacity:1;transform:translateY(0) skewX(0)} }
    @keyframes jitter3 { 0%{opacity:0;transform:translateY(22px) skewX(-22deg)} 65%{transform:translateY(-3px) skewX(6deg)} 80%{transform:translateY(1px)} 100%{opacity:1;transform:translateY(0) skewX(0)} }
    @keyframes jitter4 { 0%{opacity:0;transform:translateY(-20px) skewX(16deg)} 60%{transform:translateY(3px) skewX(-5deg)} 80%{transform:translateY(-2px)} 100%{opacity:1;transform:translateY(0) skewX(0)} }
    @keyframes jitter5 { 0%{opacity:0;transform:translateY(16px) skewX(-12deg)} 55%{transform:translateY(-5px) skewX(4deg)} 80%{transform:translateY(1px)} 100%{opacity:1;transform:translateY(0) skewX(0)} }
    @keyframes jitter6 { 0%{opacity:0;transform:translateY(-24px) skewX(18deg)} 65%{transform:translateY(4px) skewX(-6deg)} 80%{transform:translateY(-1px)} 100%{opacity:1;transform:translateY(0) skewX(0)} }

    /* Swipe reveal line */
    @keyframes swipeL { 0%{transform:scaleX(0);transform-origin:left} 100%{transform:scaleX(1);transform-origin:left} }
    @keyframes swipeR { 0%{transform:scaleX(0);transform-origin:right} 100%{transform:scaleX(1);transform-origin:right} }

    /* Evaporate — blur + fade */
    @keyframes evaporate { 0%{opacity:0;filter:blur(8px)} 100%{opacity:1;filter:blur(0)} }

    /* Pulse glow */
    @keyframes glowLoop { 0%,100%{opacity:0.10} 50%{opacity:0.25} }

    /* Cursor blink */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Dot ping */
    @keyframes ping { 0%{r:3;opacity:1} 70%{r:9;opacity:0} 100%{r:3;opacity:0} }

    .l0 { animation: jitter0 0.65s cubic-bezier(.22,1,.36,1) 0.05s both; }
    .l1 { animation: jitter1 0.65s cubic-bezier(.22,1,.36,1) 0.13s both; }
    .l2 { animation: jitter2 0.65s cubic-bezier(.22,1,.36,1) 0.21s both; }
    .l3 { animation: jitter3 0.65s cubic-bezier(.22,1,.36,1) 0.29s both; }
    .l4 { animation: jitter4 0.65s cubic-bezier(.22,1,.36,1) 0.37s both; }
    .l5 { animation: jitter5 0.65s cubic-bezier(.22,1,.36,1) 0.45s both; }
    .l6 { animation: jitter6 0.65s cubic-bezier(.22,1,.36,1) 0.53s both; }
    .dot{ animation: jitter0 0.65s cubic-bezier(.22,1,.36,1) 0.61s both; }

    .lineL { animation: swipeL 0.8s cubic-bezier(.22,1,.36,1) 0.9s both; }
    .lineR { animation: swipeR 0.8s cubic-bezier(.22,1,.36,1) 0.9s both; }

    .role  { animation: evaporate 1s ease 1.1s both; }
    .loc   { animation: evaporate 1s ease 1.4s both; }
    .email { animation: evaporate 1s ease 1.65s both; }

    .glow  { animation: glowLoop 4s ease-in-out infinite; }
    .cur   { animation: blink 1.1s step-end infinite; }
    .ping  { animation: ping 2s ease-out 2s infinite; }
  </style>

  <!-- Background glow blob -->
  <ellipse cx="400" cy="90" rx="320" ry="60" fill="#4af0a0" class="glow"/>

  <!-- Top rule swipe -->
  <rect class="lineL" x="40" y="22" width="720" height="0.6" fill="#4af0a0" opacity="0.3"/>

  <!-- NAME — each letter jitters in independently -->
  <!-- M -->
  <text class="l0" x="88"  y="102" font-family="'Roboto Mono',monospace" font-size="54" font-weight="700" fill="#e8e8ea" filter="url(#glow)">M</text>
  <!-- U -->
  <text class="l1" x="131" y="102" font-family="'Roboto Mono',monospace" font-size="54" font-weight="700" fill="#e8e8ea" filter="url(#glow)">U</text>
  <!-- Z -->
  <text class="l2" x="175" y="102" font-family="'Roboto Mono',monospace" font-size="54" font-weight="700" fill="#e8e8ea" filter="url(#glow)">Z</text>
  <!-- A -->
  <text class="l3" x="218" y="102" font-family="'Roboto Mono',monospace" font-size="54" font-weight="700" fill="#e8e8ea" filter="url(#glow)">A</text>
  <!-- H -->
  <text class="l4" x="261" y="102" font-family="'Roboto Mono',monospace" font-size="54" font-weight="700" fill="#e8e8ea" filter="url(#glow)">H</text>
  <!-- I -->
  <text class="l5" x="305" y="102" font-family="'Roboto Mono',monospace" font-size="54" font-weight="700" fill="#e8e8ea" filter="url(#glow)">I</text>
  <!-- D -->
  <text class="l6" x="325" y="102" font-family="'Roboto Mono',monospace" font-size="54" font-weight="700" fill="#e8e8ea" filter="url(#glow)">D</text>
  <!-- accent dot -->
  <text class="dot" x="368" y="102" font-family="'Roboto Mono',monospace" font-size="54" font-weight="700" fill="#4af0a0" filter="url(#softglow)">_</text>

  <!-- Ping dot next to cursor -->
  <circle class="ping" cx="408" cy="76" r="3" fill="#4af0a0" opacity="0"/>
  <circle class="cur"  cx="408" cy="76" r="3" fill="#4af0a0"/>

  <!-- Bottom rule swipe -->
  <rect class="lineR" x="40" y="118" width="720" height="0.6" fill="#4af0a0" opacity="0.3"/>

  <!-- Role — evaporate -->
  <text class="role" x="400" y="144" font-family="'Roboto Mono',monospace" font-size="10.5" font-weight="400" fill="rgba(232,232,234,0.32)" text-anchor="middle" letter-spacing="5">RESEARCHER  ·  DEVELOPER  ·  GRADUATE</text>

  <!-- Location -->
  <text class="loc" x="400" y="164" font-family="'Roboto Mono',monospace" font-size="9" font-weight="300" fill="rgba(74,240,160,0.45)" text-anchor="middle" letter-spacing="3">GREEN UNIVERSITY OF BANGLADESH  ·  CSE</text>

  <!-- Email -->
  <text class="email" x="400" y="186" font-family="'Roboto Mono',monospace" font-size="9" font-weight="300" fill="rgba(232,232,234,0.18)" text-anchor="middle" letter-spacing="1">mdmuzahid0408@gmail.com</text>
</svg>
