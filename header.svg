<svg width="800" height="160" viewBox="0 0 800 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes scanline {
      0% { transform: translateY(-10px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(10px); opacity: 0; }
    }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes drawLine {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.15; }
      50% { opacity: 0.35; }
    }
    .name { animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) 0.1s both; }
    .role { animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) 0.4s both; }
    .loc  { animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) 0.65s both; }
    .line { animation: drawLine 1.2s cubic-bezier(.22,1,.36,1) 0.3s both; stroke-dasharray: 800; }
    .dot-pulse { animation: glowPulse 2.8s ease-in-out infinite; }
    .cursor { animation: blink 1.1s step-end infinite; }
    .graduate-tag { animation: fadeIn 0.6s ease 1.2s both; }
  </style>

  <!-- background glow -->
  <ellipse cx="400" cy="80" rx="320" ry="55" fill="#4af0a0" class="dot-pulse"/>

  <!-- scan line decoration -->
  <line x1="60" y1="22" x2="740" y2="22" stroke="#4af0a0" stroke-width="0.4" stroke-opacity="0.2" class="line"/>
  <line x1="60" y1="138" x2="740" y2="138" stroke="#4af0a0" stroke-width="0.4" stroke-opacity="0.2" class="line"/>

  <!-- name -->
  <text class="name" x="400" y="78" font-family="'Courier New',Courier,monospace" font-size="52" font-weight="700" fill="#e8e8ea" text-anchor="middle" letter-spacing="-2.5">
    MUZ7<tspan fill="#4af0a0" letter-spacing="0">.</tspan>AHID
  </text>

  <!-- role -->
  <text class="role" x="400" y="108" font-family="'Courier New',Courier,monospace" font-size="11" fill="rgba(232,232,234,0.38)" text-anchor="middle" letter-spacing="5">
    RESEARCHER  ·  DEVELOPER  ·  GRADUATE
  </text>

  <!-- location -->
  <text class="loc" x="400" y="128" font-family="'Courier New',Courier,monospace" font-size="9.5" fill="rgba(74,240,160,0.45)" text-anchor="middle" letter-spacing="3">
    ⌘  GREEN UNIVERSITY OF BANGLADESH  ·  CSE
  </text>

  <!-- corner brackets -->
  <path d="M60 40 L60 22 L82 22" stroke="#4af0a0" stroke-width="1" stroke-opacity="0.4" fill="none" class="line"/>
  <path d="M740 40 L740 22 L718 22" stroke="#4af0a0" stroke-width="1" stroke-opacity="0.4" fill="none" class="line"/>
  <path d="M60 120 L60 138 L82 138" stroke="#4af0a0" stroke-width="1" stroke-opacity="0.4" fill="none" class="line"/>
  <path d="M740 120 L740 138 L718 138" stroke="#4af0a0" stroke-width="1" stroke-opacity="0.4" fill="none" class="line"/>
</svg>
