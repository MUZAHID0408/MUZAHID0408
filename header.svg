<svg width="800" height="190" viewBox="0 0 800 190" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Scramble — letters drop in from random offsets with skew */
    @keyframes scr0{0%{opacity:0;transform:translateY(-30px) rotate(-8deg)}70%{transform:translateY(3px) rotate(1deg)}100%{opacity:1;transform:translateY(0) rotate(0)}}
    @keyframes scr1{0%{opacity:0;transform:translateY(28px) rotate(6deg)}70%{transform:translateY(-2px) rotate(-1deg)}100%{opacity:1;transform:translateY(0) rotate(0)}}
    @keyframes scr2{0%{opacity:0;transform:translateY(-22px) rotate(10deg)}65%{transform:translateY(4px) rotate(-2deg)}100%{opacity:1;transform:translateY(0) rotate(0)}}
    @keyframes scr3{0%{opacity:0;transform:translateY(32px) rotate(-9deg)}72%{transform:translateY(-3px) rotate(2deg)}100%{opacity:1;transform:translateY(0) rotate(0)}}
    @keyframes scr4{0%{opacity:0;transform:translateY(-26px) rotate(7deg)}68%{transform:translateY(2px) rotate(-1deg)}100%{opacity:1;transform:translateY(0) rotate(0)}}
    @keyframes scr5{0%{opacity:0;transform:translateY(24px) rotate(-11deg)}70%{transform:translateY(-4px) rotate(2deg)}100%{opacity:1;transform:translateY(0) rotate(0)}}
    @keyframes scr6{0%{opacity:0;transform:translateY(-34px) rotate(8deg)}74%{transform:translateY(3px) rotate(-1deg)}100%{opacity:1;transform:translateY(0) rotate(0)}}

    /* Swipe block — horizontal wipe leaving text */
    @keyframes wipeH{0%{clip-path:inset(0 100% 0 0)}100%{clip-path:inset(0 0% 0 0)}}

    /* Evaporate — blur dissolve */
    @keyframes evap{0%{opacity:0;filter:blur(12px)}100%{opacity:1;filter:blur(0)}}

    /* Line draw left to right */
    @keyframes lineL{0%{stroke-dashoffset:760}100%{stroke-dashoffset:0}}
    @keyframes lineR{0%{stroke-dashoffset:-760}100%{stroke-dashoffset:0}}

    /* Tick marks draw */
    @keyframes tickIn{0%{opacity:0;transform:scaleY(0)}100%{opacity:1;transform:scaleY(1)}}

    /* Cursor blink */
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

    /* Bracket draw */
    @keyframes brk{0%{stroke-dashoffset:80}100%{stroke-dashoffset:0}}

    .l0{animation:scr0 0.6s cubic-bezier(.22,1,.36,1) 0.05s both}
    .l1{animation:scr1 0.6s cubic-bezier(.22,1,.36,1) 0.13s both}
    .l2{animation:scr2 0.6s cubic-bezier(.22,1,.36,1) 0.21s both}
    .l3{animation:scr3 0.6s cubic-bezier(.22,1,.36,1) 0.29s both}
    .l4{animation:scr4 0.6s cubic-bezier(.22,1,.36,1) 0.37s both}
    .l5{animation:scr5 0.6s cubic-bezier(.22,1,.36,1) 0.45s both}
    .l6{animation:scr6 0.6s cubic-bezier(.22,1,.36,1) 0.53s both}

    .role {animation:wipeH 1s steps(32,end) 0.9s both}
    .loc  {animation:evap  0.9s ease 1.3s both}
    .mail {animation:evap  0.9s ease 1.6s both}

    .hl{stroke-dasharray:760;animation:lineL 0.9s cubic-bezier(.22,1,.36,1) 0.7s both}
    .hr{stroke-dasharray:760;animation:lineR 0.9s cubic-bezier(.22,1,.36,1) 0.7s both}

    .tk0{animation:tickIn 0.3s ease 0.75s both;transform-origin:center}
    .tk1{animation:tickIn 0.3s ease 0.82s both;transform-origin:center}
    .tk2{animation:tickIn 0.3s ease 0.89s both;transform-origin:center}
    .tk3{animation:tickIn 0.3s ease 0.96s both;transform-origin:center}

    .bl{stroke-dasharray:80;animation:brk 0.4s ease 0.65s both}
    .br{stroke-dasharray:80;animation:brk 0.4s ease 0.72s both}

    .cur{animation:blink 1.1s step-end infinite}
  </style>

  <!-- Corner brackets — drawn in -->
  <path class="bl" d="M24 28 L24 8 L54 8"  stroke="#4af0a0" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path class="br" d="M776 28 L776 8 L746 8" stroke="#4af0a0" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path class="bl" d="M24 162 L24 182 L54 182" stroke="#4af0a0" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path class="br" d="M776 162 L776 182 L746 182" stroke="#4af0a0" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Horizontal rules -->
  <line class="hl" x1="24" y1="52" x2="784" y2="52" stroke="rgba(255,255,255,0.08)" stroke-width="0.6"/>
  <line class="hr" x1="24" y1="138" x2="784" y2="138" stroke="rgba(255,255,255,0.08)" stroke-width="0.6"/>

  <!-- Tick marks on top rule -->
  <line class="tk0" x1="200" y1="48" x2="200" y2="56" stroke="#4af0a0" stroke-width="1" opacity="0.4"/>
  <line class="tk1" x1="350" y1="48" x2="350" y2="56" stroke="#4af0a0" stroke-width="1" opacity="0.4"/>
  <line class="tk2" x1="450" y1="48" x2="450" y2="56" stroke="#4af0a0" stroke-width="1" opacity="0.4"/>
  <line class="tk3" x1="600" y1="48" x2="600" y2="56" stroke="#4af0a0" stroke-width="1" opacity="0.4"/>

  <!-- NAME letters — individual scramble -->
  <text class="l0" x="80"  y="118" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea">M</text>
  <text class="l1" x="126" y="118" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea">U</text>
  <text class="l2" x="172" y="118" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea">Z</text>
  <text class="l3" x="218" y="118" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea">A</text>
  <text class="l4" x="264" y="118" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea">H</text>
  <text class="l5" x="312" y="118" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea">I</text>
  <text class="l6" x="336" y="118" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#e8e8ea">D</text>

  <!-- Accent underscore + blinking cursor -->
  <text x="383" y="118" font-family="'Roboto Mono',monospace" font-size="58" font-weight="700" fill="#4af0a0" opacity="0.9">.</text>
  <rect class="cur" x="415" y="72" width="10" height="52" rx="1" fill="#4af0a0" opacity="0.7"/>

  <!-- Role — swipe reveal -->
  <g class="role">
    <text x="400" y="158" font-family="'Roboto Mono',monospace" font-size="10" font-weight="400" fill="rgba(232,232,234,0.3)" text-anchor="middle" letter-spacing="6">RESEARCHER  ·  DEVELOPER  ·  GRADUATE</text>
  </g>

  <!-- Location — evaporate -->
  <text class="loc" x="400" y="174" font-family="'Roboto Mono',monospace" font-size="9" font-weight="300" fill="rgba(74,240,160,0.4)" text-anchor="middle" letter-spacing="3">GREEN UNIVERSITY OF BANGLADESH  ·  CSE</text>

  <!-- Email — evaporate -->
  <text class="mail" x="400" y="188" font-family="'Roboto Mono',monospace" font-size="8.5" font-weight="300" fill="rgba(232,232,234,0.15)" text-anchor="middle" letter-spacing="1">mdmuzahid0408@gmail.com</text>
</svg>
