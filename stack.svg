<svg width="800" height="260" viewBox="0 0 800 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="rowGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="accentGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="row0Clip"><rect x="130" y="36" width="660" height="22"/></clipPath>
    <clipPath id="row1Clip"><rect x="130" y="68" width="660" height="22"/></clipPath>
    <clipPath id="row2Clip"><rect x="130" y="100" width="660" height="22"/></clipPath>
    <clipPath id="row3Clip"><rect x="130" y="132" width="660" height="22"/></clipPath>
    <clipPath id="row4Clip"><rect x="130" y="164" width="660" height="22"/></clipPath>
    <clipPath id="row5Clip"><rect x="130" y="196" width="660" height="22"/></clipPath>
  </defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&amp;display=swap');

    /* ── Accent bar extend from left ── */
    @keyframes barExtend{
      0%  {transform:scaleX(0);transform-origin:left}
      60% {transform:scaleX(1.02)}
      100%{transform:scaleX(1)}
    }

    /* ── Column separator draw ── */
    @keyframes colDraw{
      0%  {transform:scaleY(0);opacity:0;transform-origin:top}
      100%{transform:scaleY(1);opacity:1}
    }

    /* ── Row: index flicker on (phosphor tube effect) ── */
    @keyframes phosphorOn{
      0%  {opacity:0;fill:#4af0a0}
      12% {opacity:1;fill:#ffffff;filter:blur(1px)}
      25% {opacity:0.3;fill:#4af0a0}
      40% {opacity:1;fill:#4af0a0}
      55% {opacity:0.7}
      70% {opacity:1}
      85% {opacity:0.85}
      100%{opacity:1;fill:rgba(74,240,160,0.35)}
    }

    /* ── Label: slide from left edge ── */
    @keyframes labelSlide{
      0%  {opacity:0;transform:translateX(-18px)}
      60% {transform:translateX(2px)}
      100%{opacity:1;transform:translateX(0)}
    }

    /* ── Value: matrix cascade — characters materialize top-to-bottom ── */
    @keyframes matrixDrop{
      0%  {clip-path:inset(0 100% 0 0);opacity:0;filter:blur(3px)}
      8%  {opacity:1;filter:blur(1px)}
      100%{clip-path:inset(0 0% 0 0);opacity:1;filter:blur(0)}
    }

    /* ── Divider draw right-to-left ── */
    @keyframes divRL{0%{stroke-dashoffset:-780}100%{stroke-dashoffset:0}}

    /* ── Active highlight shimmer ── */
    @keyframes rowShimmer{
      0%,100%{opacity:0}
      50%    {opacity:1}
    }

    /* ── Ghost binary trail pre-reveal (column 0 ghost chars) ── */
    @keyframes ghostFade{
      0%  {opacity:0.5;fill:#4af0a0}
      60% {opacity:0}
      100%{opacity:0}
    }

    /* ── Header evap ── */
    @keyframes hdrEvap{0%{opacity:0;filter:blur(6px)}100%{opacity:1;filter:blur(0)}}

    /* Bar & separators */
    .acc-bar  { animation:barExtend 0.6s cubic-bezier(.22,1,.36,1) 0.0s both }
    .col-sep0 { animation:colDraw  0.4s ease 0.22s both }
    .col-sep1 { animation:colDraw  0.4s ease 0.30s both }
    .hdr-lbl  { animation:hdrEvap  0.5s ease 0.15s both }

    /* Row stagger: index, label, value, div */
    .idx0{animation:phosphorOn  0.7s ease 0.18s both}
    .idx1{animation:phosphorOn  0.7s ease 0.30s both}
    .idx2{animation:phosphorOn  0.7s ease 0.42s both}
    .idx3{animation:phosphorOn  0.7s ease 0.54s both}
    .idx4{animation:phosphorOn  0.7s ease 0.66s both}
    .idx5{animation:phosphorOn  0.7s ease 0.78s both}

    .lbl0{animation:labelSlide  0.45s cubic-bezier(.22,1,.36,1) 0.24s both}
    .lbl1{animation:labelSlide  0.45s cubic-bezier(.22,1,.36,1) 0.36s both}
    .lbl2{animation:labelSlide  0.45s cubic-bezier(.22,1,.36,1) 0.48s both}
    .lbl3{animation:labelSlide  0.45s cubic-bezier(.22,1,.36,1) 0.60s both}
    .lbl4{animation:labelSlide  0.45s cubic-bezier(.22,1,.36,1) 0.72s both}
    .lbl5{animation:labelSlide  0.45s cubic-bezier(.22,1,.36,1) 0.84s both}

    .val0{animation:matrixDrop  0.9s steps(40,end) 0.30s both}
    .val1{animation:matrixDrop  0.75s steps(32,end) 0.42s both}
    .val2{animation:matrixDrop  0.35s steps(12,end) 0.54s both}
    .val3{animation:matrixDrop  1.05s steps(50,end) 0.66s both}
    .val4{animation:matrixDrop  0.7s steps(36,end) 0.78s both}
    .val5{animation:matrixDrop  0.35s steps(14,end) 0.90s both}

    .div0{stroke-dasharray:780;animation:divRL 0.5s ease 0.34s both}
    .div1{stroke-dasharray:780;animation:divRL 0.5s ease 0.46s both}
    .div2{stroke-dasharray:780;animation:divRL 0.5s ease 0.58s both}
    .div3{stroke-dasharray:780;animation:divRL 0.5s ease 0.70s both}
    .div4{stroke-dasharray:780;animation:divRL 0.5s ease 0.82s both}

    /* Ghost binary pre-chars */
    .gh0{animation:ghostFade 0.4s ease 0.18s both}
    .gh1{animation:ghostFade 0.4s ease 0.30s both}
    .gh2{animation:ghostFade 0.4s ease 0.42s both}
    .gh3{animation:ghostFade 0.4s ease 0.54s both}
    .gh4{animation:ghostFade 0.4s ease 0.66s both}
    .gh5{animation:ghostFade 0.4s ease 0.78s both}

    /* Text styles */
    .hdr{font-family:'Roboto Mono',monospace;font-size:9px;fill:rgba(74,240,160,0.55);letter-spacing:3px}
    .idx{font-family:'Roboto Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px}
    .lbl{font-family:'Roboto Mono',monospace;font-size:9px;fill:rgba(232,232,234,0.22);letter-spacing:2px}
    .val{font-family:'Roboto Mono',monospace;font-size:11.5px;fill:rgba(232,232,234,0.72);letter-spacing:0.3px}
    .ghost{font-family:'Roboto Mono',monospace;font-size:9px;letter-spacing:0.5px}
  </style>

  <!-- Border rules -->
  <line x1="0" y1="0"   x2="800" y2="0"   stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="0" y1="260" x2="800" y2="260" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Left accent bar -->
  <rect class="acc-bar" x="0" y="0" width="3" height="260" fill="#4af0a0" opacity="0.55" filter="url(#accentGlow)"/>

  <!-- Column separators -->
  <line class="col-sep0" x1="40"  y1="26" x2="40"  y2="240" stroke="rgba(74,240,160,0.08)" stroke-width="0.6"/>
  <line class="col-sep1" x1="122" y1="26" x2="122" y2="240" stroke="rgba(74,240,160,0.06)" stroke-width="0.6"/>

  <!-- Header -->
  <text class="hdr hdr-lbl" x="14" y="20">// STACK</text>

  <!-- ── ROW 0: lang ── -->
  <text class="idx idx0" x="15" y="54" fill="rgba(74,240,160,0.35)">00</text>
  <!-- ghost binary pre-chars -->
  <text class="ghost gh0" x="130" y="54" fill="#4af0a0" opacity="0">01101100</text>
  <text class="lbl lbl0" x="52" y="54">lang</text>
  <g clip-path="url(#row0Clip)">
    <text class="val val0" x="130" y="54">Python · JavaScript · Dart · PHP · C · C++ · Java · SQL</text>
  </g>
  <line class="div0" x1="14" y1="64" x2="786" y2="64" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- ── ROW 1: web ── -->
  <text class="idx idx1" x="15" y="86" fill="rgba(74,240,160,0.35)">01</text>
  <text class="ghost gh1" x="130" y="86" fill="#4af0a0" opacity="0">10110010</text>
  <text class="lbl lbl1" x="52" y="86">web</text>
  <g clip-path="url(#row1Clip)">
    <text class="val val1" x="130" y="86">React · Node.js · Express · FastAPI · Flask · REST</text>
  </g>
  <line class="div1" x1="14" y1="96" x2="786" y2="96" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- ── ROW 2: mobile ── -->
  <text class="idx idx2" x="15" y="118" fill="rgba(74,240,160,0.35)">02</text>
  <text class="ghost gh2" x="130" y="118" fill="#4af0a0" opacity="0">01001101</text>
  <text class="lbl lbl2" x="52" y="118">mobile</text>
  <g clip-path="url(#row2Clip)">
    <text class="val val2" x="130" y="118">Flutter</text>
  </g>
  <line class="div2" x1="14" y1="128" x2="786" y2="128" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- ── ROW 3: ml / ai ── -->
  <text class="idx idx3" x="15" y="150" fill="rgba(74,240,160,0.35)">03</text>
  <text class="ghost gh3" x="130" y="150" fill="#4af0a0" opacity="0">11010010</text>
  <text class="lbl lbl3" x="52" y="150">ml / ai</text>
  <g clip-path="url(#row3Clip)">
    <text class="val val3" x="130" y="150">NumPy · Pandas · OpenCV · LangGraph · RAG · LLM fine-tuning · NLP</text>
  </g>
  <line class="div3" x1="14" y1="160" x2="786" y2="160" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- ── ROW 4: data ── -->
  <text class="idx idx4" x="15" y="182" fill="rgba(74,240,160,0.35)">04</text>
  <text class="ghost gh4" x="130" y="182" fill="#4af0a0" opacity="0">10011010</text>
  <text class="lbl lbl4" x="52" y="182">data</text>
  <g clip-path="url(#row4Clip)">
    <text class="val val4" x="130" y="182">MongoDB · MySQL · SQLite · SQLAlchemy · Mongoose</text>
  </g>
  <line class="div4" x1="14" y1="192" x2="786" y2="192" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- ── ROW 5: tools ── -->
  <text class="idx idx5" x="15" y="214" fill="rgba(74,240,160,0.35)">05</text>
  <text class="ghost gh5" x="130" y="214" fill="#4af0a0" opacity="0">01100110</text>
  <text class="lbl lbl5" x="52" y="214">tools</text>
  <g clip-path="url(#row5Clip)">
    <text class="val val5" x="130" y="214">Git · Jupyter · GitHub</text>
  </g>
</svg>
