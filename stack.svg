<svg width="800" height="230" viewBox="0 0 800 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes rowSlide {
      0%   { opacity: 0; transform: translateX(-12px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes pipeFade {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes accentGrow {
      0%   { height: 0; }
      100% { height: 200px; }
    }
    @keyframes tagPop {
      0%   { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }
    .r0  { animation: rowSlide 0.55s cubic-bezier(.22,1,.36,1) 0.10s both; }
    .r1  { animation: rowSlide 0.55s cubic-bezier(.22,1,.36,1) 0.22s both; }
    .r2  { animation: rowSlide 0.55s cubic-bezier(.22,1,.36,1) 0.34s both; }
    .r3  { animation: rowSlide 0.55s cubic-bezier(.22,1,.36,1) 0.46s both; }
    .r4  { animation: rowSlide 0.55s cubic-bezier(.22,1,.36,1) 0.58s both; }
    .r5  { animation: rowSlide 0.55s cubic-bezier(.22,1,.36,1) 0.70s both; }
    .acc { animation: accentGrow 0.8s cubic-bezier(.22,1,.36,1) 0.05s both; }
    .pip { animation: pipeFade 0.4s ease 0.9s both; }
    .lbl { font-family:'Courier New',monospace; font-size:9.5px; fill:rgba(232,232,234,0.22); letter-spacing:2px; }
    .val { font-family:'Courier New',monospace; font-size:11px; fill:rgba(232,232,234,0.62); }
    .pip-char { font-family:'Courier New',monospace; font-size:11px; fill:rgba(255,255,255,0.1); }
  </style>

  <rect class="acc" x="0" y="18" width="2" height="200" fill="#4af0a0" opacity="0.5"/>
  <line class="pip" x1="110" y1="30" x2="110" y2="195" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>

  <line x1="0" y1="0"   x2="800" y2="0"   stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
  <line x1="0" y1="230" x2="800" y2="230" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>

  <text x="18" y="20" font-family="'Courier New',monospace" font-size="9" fill="rgba(74,240,160,0.5)" letter-spacing="3">// STACK</text>

  <g class="r0">
    <text x="18"  y="50"  class="lbl">lang</text>
    <text x="120" y="50"  class="val">Python · JavaScript · Dart · PHP · C · C++ · Java · SQL</text>
  </g>
  <line x1="18" y1="62" x2="782" y2="62" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <g class="r1">
    <text x="18"  y="82"  class="lbl">web</text>
    <text x="120" y="82"  class="val">React · Node.js · Express · FastAPI · Flask · REST</text>
  </g>
  <line x1="18" y1="94" x2="782" y2="94" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <g class="r2">
    <text x="18"  y="114" class="lbl">mobile</text>
    <text x="120" y="114" class="val">Flutter</text>
  </g>
  <line x1="18" y1="126" x2="782" y2="126" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <g class="r3">
    <text x="18"  y="146" class="lbl">ml / ai</text>
    <text x="120" y="146" class="val">NumPy · Pandas · OpenCV · LangGraph · RAG · LLM fine-tuning · NLP</text>
  </g>
  <line x1="18" y1="158" x2="782" y2="158" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <g class="r4">
    <text x="18"  y="178" class="lbl">data</text>
    <text x="120" y="178" class="val">MongoDB · MySQL · SQLite · SQLAlchemy · Mongoose</text>
  </g>
  <line x1="18" y1="190" x2="782" y2="190" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>

  <g class="r5">
    <text x="18"  y="210" class="lbl">tools</text>
    <text x="120" y="210" class="val">Git · Jupyter · GitHub</text>
  </g>
</svg>
